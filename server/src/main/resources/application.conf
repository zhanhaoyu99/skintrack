ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [com.skintrack.server.ApplicationKt.module]
    }
}

app {
    jwt {
        secret = ${JWT_SECRET}
        issuer = "skintrack"
        audience = "skintrack-app"
        expireMinutes = 60  # 1 hour (access token)
        refreshExpireMinutes = 43200  # 30 days (refresh token)
    }
    database {
        url = "jdbc:postgresql://localhost:5432/skintrack"
        url = ${?DATABASE_URL}
        user = "zane"
        user = ${?DATABASE_USER}
        password = ${DATABASE_PASSWORD}
    }
    uploads {
        dir = "uploads"
        dir = ${?UPLOADS_DIR}
        baseUrl = "http://localhost:8080"
        baseUrl = ${?BASE_URL}
    }
    cors {
        allowedHosts = "localhost"
        allowedHosts = ${?CORS_ALLOWED_HOSTS}
    }
    ai {
        provider = "openai"
        provider = ${?AI_PROVIDER}
        apiKey = "YOUR_API_KEY"
        apiKey = ${?AI_API_KEY}
        model = "gpt-4o"
        model = ${?AI_MODEL}
        maxDailyAnalysesPerUser = 10
        maxDailyAnalysesPerUser = ${?AI_MAX_DAILY_ANALYSES}
    }
}
