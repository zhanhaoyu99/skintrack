ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [com.skintrack.server.ApplicationKt.module]
    }
}

app {
    jwt {
        secret = "skintrack-dev-secret-change-in-production"
        secret = ${?JWT_SECRET}
        issuer = "skintrack"
        audience = "skintrack-app"
        expireMinutes = 43200  # 30 days
    }
    database {
        url = "jdbc:postgresql://localhost:5432/skintrack"
        url = ${?DATABASE_URL}
        user = "zane"
        user = ${?DATABASE_USER}
        password = ""
        password = ${?DATABASE_PASSWORD}
    }
    uploads {
        dir = "uploads"
        dir = ${?UPLOADS_DIR}
        baseUrl = "http://localhost:8080"
        baseUrl = ${?BASE_URL}
    }
}
