<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; }

/* Avatar edit */
.avatar-edit {
  position: relative; width: 88px; height: 88px; margin: 0 auto var(--space-24);
}
.avatar-edit .av {
  width: 88px; height: 88px; border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--rose-300), var(--rose-400));
  display: flex; align-items: center; justify-content: center;
  font-size: var(--font-h1-size); font-weight: 700; color: var(--content-inverse);
  box-shadow: var(--shadow-rose-sm);
}
.avatar-edit .edit-badge {
  position: absolute; bottom: 0; right: 0;
  width: 28px; height: 28px; border-radius: var(--radius-full);
  background: var(--interactive-primary); border: 2px solid var(--surface-primary);
  display: flex; align-items: center; justify-content: center;
}
.avatar-edit .edit-badge svg { width: 14px; height: 14px; color: white; stroke-width: 2.5; }

/* Skin type selector */
.st-selector { display: flex; flex-wrap: wrap; gap: var(--space-8); }
.st-opt {
  padding: var(--space-8) var(--space-16); border-radius: var(--radius-full);
  border: 1.5px solid var(--border-default); font-size: var(--font-b3-size);
  font-weight: 600; color: var(--content-secondary); cursor: pointer;
  transition: all var(--duration-fast);
}
.st-opt.active {
  border-color: var(--interactive-primary); background: var(--surface-brand-subtle);
  color: var(--content-brand);
}

/* Password strength */
.pw-strength { display: flex; gap: var(--space-4); margin-top: var(--space-6); margin-bottom: var(--space-4); }
.pw-bar { flex: 1; height: 3px; border-radius: var(--radius-full); background: var(--surface-tertiary); }
.pw-bar.filled { background: var(--content-success); }
.pw-bar.medium { background: var(--warning-400); }
.pw-hint { font-size: var(--font-c2-size); color: var(--content-tertiary); margin-bottom: var(--space-12); }

/* Lock icon for password */
.lock-icon {
  width: 64px; height: 64px; border-radius: var(--radius-full);
  background: var(--grad-primary); display: flex; align-items: center; justify-content: center;
  margin: 0 auto var(--space-20); box-shadow: var(--shadow-brand-sm);
}
.lock-icon svg { width: var(--icon-size-lg); height: var(--icon-size-lg); color: white; }
</style>
</head>
<body>

<!-- ═══════ EDIT PROFILE ═══════ -->
<div>
<div class="phone-label">Edit Profile</div>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="top-app-bar">
    <div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
    <span class="title">编辑资料</span>
    <div class="action" style="font-size:var(--font-b2-size);font-weight:600;color:var(--content-brand);padding-right:var(--space-12)">保存</div>
  </div>

  <div class="content">
    <!-- Avatar -->
    <div class="avatar-edit">
      <div class="av">L</div>
      <div class="edit-badge"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
    </div>

    <!-- Fields -->
    <div class="text-field">
      <label>昵称</label>
      <input type="text" value="Lisa">
    </div>

    <div class="text-field">
      <label>邮箱</label>
      <input type="email" value="lisa@example.com" style="color:var(--content-tertiary)">
      <div class="helper">邮箱注册后不可修改</div>
    </div>

    <div style="margin-bottom:var(--space-16)">
      <label style="font-size:var(--font-b3-size);font-weight:600;color:var(--content-secondary);display:block;margin-bottom:var(--space-8)">肤质类型</label>
      <div class="st-selector">
        <span class="st-opt">油性</span>
        <span class="st-opt">干性</span>
        <span class="st-opt active">混合</span>
        <span class="st-opt">敏感</span>
        <span class="st-opt">中性</span>
      </div>
    </div>

    <div style="margin-bottom:var(--space-16)">
      <label style="font-size:var(--font-b3-size);font-weight:600;color:var(--content-secondary);display:block;margin-bottom:var(--space-8)">肌肤目标</label>
      <div class="st-selector">
        <span class="st-opt active" style="border-color:var(--rose-300);background:var(--rose-50);color:var(--rose-500)">祛痘</span>
        <span class="st-opt active" style="border-color:var(--primary-300);background:var(--primary-50);color:var(--primary-500)">收毛孔</span>
        <span class="st-opt active" style="border-color:var(--secondary-300);background:var(--secondary-50);color:var(--secondary-600)">提亮</span>
        <span class="st-opt">抗老</span>
        <span class="st-opt">补水</span>
        <span class="st-opt">祛斑</span>
      </div>
    </div>

    <div class="text-field">
      <label>个性签名</label>
      <input type="text" placeholder="一句话描述你的护肤态度">
    </div>
  </div>
</div>
</div>

<!-- ═══════ CHANGE PASSWORD ═══════ -->
<div>
<div class="phone-label">Change Password</div>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="top-app-bar">
    <div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
    <span class="title">修改密码</span>
  </div>

  <div class="content" style="padding-top:var(--space-24)">
    <div class="lock-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg></div>

    <div class="text-field">
      <label>当前密码</label>
      <input type="password" placeholder="输入当前密码">
    </div>

    <div class="text-field" style="margin-bottom:0">
      <label>新密码</label>
      <input type="password" placeholder="至少 6 位新密码">
    </div>
    <div class="pw-strength">
      <div class="pw-bar filled"></div>
      <div class="pw-bar filled"></div>
      <div class="pw-bar medium"></div>
      <div class="pw-bar"></div>
    </div>
    <div class="pw-hint">密码强度：中等</div>

    <div class="text-field">
      <label>确认新密码</label>
      <input type="password" placeholder="再次输入新密码">
    </div>

    <button class="btn btn-primary" style="margin-top:var(--space-8)">确认修改</button>
  </div>
</div>
</div>

</body>
</html>
