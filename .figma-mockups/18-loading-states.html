/* Hero skeleton */
.hero-sk { border-radius: var(--r-xl); padding: 22px 20px; margin: 0 16px 14px; background: linear-gradient(145deg, #D1E8DF 0%, #D8DDE0 30%, #E2E5E8 100%); display: flex; align-items: center; gap: 18px; height: 140px; }

.metric-sk { flex: 1; background: var(--surface); border-radius: var(--r-md); padding: 10px 6px; display: flex; flex-direction: column; align-items: center; gap: 6px; }

/* Record skeleton */
.rec-sk { display: flex; gap: 14px; align-items: center; padding: 12px 0; }

/* Product skeleton */
.prod-sk { display: flex; gap: 14px; align-items: center; padding: 14px 0; }
.prod-sk + .prod-sk { border-top: 0.5px solid var(--outline-variant); }
