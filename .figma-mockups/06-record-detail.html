<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: 32px; padding: 32px; justify-content: center; }
.phone-frame { flex-shrink: 0; }

/* Photo header */
.dp { height: 280px; position: relative; overflow: hidden;
  background: var(--skin-placeholder);
}
.dp .face-ov { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-46%); opacity: 0.07; }
.dp .face-ov svg { width: 180px; height: 230px; color: #000; fill: none; stroke-width: 0.7; }
/* Score pill on photo */
.dp .score-tag { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.35); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  padding: 7px 18px; border-radius: var(--r-full); color: white; font-size: 14px; font-weight: 700;
  z-index: 3; display: flex; align-items: center; gap: 7px;
  border: 0.5px solid rgba(255,255,255,0.1);
}
.dp .score-tag svg { width: 14px; height: 14px; }
/* Top bar */
.dp .tb { position: absolute; top: 54px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 12px; z-index: 10; }
.dp .tb .b { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 0.5px solid rgba(255,255,255,0.08);
}
.dp .tb .b svg { width: 22px; height: 22px; color: white; }
/* Date tag */
.dp .date-tag { position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  padding: 4px 14px; border-radius: var(--r-full); color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 500;
  z-index: 3; border: 0.5px solid rgba(255,255,255,0.06);
}

/* Score overview card */
.so { display: flex; align-items: center; gap: 18px; padding: 18px 20px; margin: -36px 16px 14px;
  background: var(--surface); border-radius: var(--r-xl);
  box-shadow: var(--shadow-lg); position: relative; z-index: 5;
  border: 0.5px solid rgba(0,0,0,0.03);
}
.so .rg { width: 74px; height: 74px; position: relative; flex-shrink: 0; }
.so .rg svg { transform: rotate(-90deg); width: 100%; height: 100%; }
.so .rg .v { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 24px; font-weight: 800; color: var(--on-surface); letter-spacing: -0.5px; }
.so .inf h3 { font-size: 19px; font-weight: 800; color: var(--on-surface); letter-spacing: -0.3px; }
.so .inf p { font-size: 13px; color: var(--on-surface-variant); margin-top: 2px; }
.so .inf .tg { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: var(--r-full);
  font-size: 12px; font-weight: 700; margin-top: 6px; background: #ECFDF5; color: #059669;
}
.so .inf .tg svg { width: 12px; height: 12px; }

/* Data card */
.dc { background: var(--surface); border-radius: var(--r-lg); padding: 16px; margin: 0 16px 12px;
  box-shadow: var(--shadow-sm); border: 0.5px solid rgba(0,0,0,0.03);
}

/* Metric row */
.mt { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
.mt .nm { width: 52px; font-size: 13px; color: var(--on-surface-variant); font-weight: 600; flex-shrink: 0; }
.mt .bar { flex: 1; height: 7px; background: var(--surface-variant); border-radius: var(--r-full); overflow: hidden; }
.mt .bar .fl { height: 100%; border-radius: var(--r-full); }
.mt .vl { width: 30px; text-align: right; font-size: 15px; font-weight: 800; color: var(--on-surface); }
.mt .ch { width: 36px; text-align: right; font-size: 11px; font-weight: 700; }
.mt + .mt { border-top: 0.5px solid var(--outline-variant); }

/* AI Card */
.ai-c { border-radius: var(--r-lg); padding: 16px; margin: 0 16px 12px;
  background: linear-gradient(135deg, #F0FAF6 0%, #F5F0FF 100%);
  border: 1px solid rgba(45,159,127,0.08);
}
.ai-b { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: var(--r-full);
  background: var(--primary-container); color: var(--on-primary-container); font-size: 11px; font-weight: 700; margin-bottom: 10px;
}
.ai-b svg { width: 14px; height: 14px; }
.ai-t { font-size: 14px; color: var(--on-surface); line-height: 1.7; }
.ai-highlight { background: linear-gradient(135deg, rgba(45,159,127,0.08), rgba(167,139,250,0.06));
  border-radius: var(--r-sm); padding: 10px 12px; margin-top: 10px; font-size: 13px; color: var(--on-surface); line-height: 1.6;
}
.ai-highlight strong { color: var(--primary); font-weight: 700; }

/* Product chips */
.pc { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--r-full);
  background: var(--surface-variant); font-size: 13px; color: var(--on-surface); font-weight: 600; margin: 0 6px 8px 0;
  border: 0.5px solid rgba(0,0,0,0.03);
}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar light" style="position:absolute;z-index:20;width:100%"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="white" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="white" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="white" stroke-width="1" fill="none" opacity="0.5"/><rect x="2" y="2" width="18" height="9" rx="2" fill="white"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="white" opacity="0.5" stroke="none"/></svg></div></div>
  <div class="content-no-padding" style="height:100%;overflow-y:auto">
    <!-- Photo header -->
    <div class="dp">
      <div class="face-ov"><svg viewBox="0 0 180 230"><ellipse cx="90" cy="105" rx="68" ry="88"/><ellipse cx="90" cy="90" rx="50" ry="62"/><circle cx="68" cy="78" r="6"/><circle cx="112" cy="78" r="6"/><ellipse cx="90" cy="100" rx="7" ry="4.5"/><path d="M72 118 c7 10 25 10 36 0"/></svg></div>
      <div class="tb">
        <div class="b"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke="white"/></svg></div>
        <div class="b"><svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" stroke="white"/></svg></div>
      </div>
      <div class="date-tag">2026 年 3 月 14 日 09:23</div>
      <div class="score-tag"><svg viewBox="0 0 14 14" stroke="white" stroke-width="2"><circle cx="7" cy="7" r="5"/></svg>82 分 · 良好</div>
    </div>

    <!-- Score overview -->
    <div class="so">
      <div class="rg">
        <svg viewBox="0 0 74 74">
          <circle cx="37" cy="37" r="31" fill="none" stroke="var(--outline-variant)" stroke-width="5"/>
          <circle cx="37" cy="37" r="31" fill="none" stroke="url(#scoreGrad)" stroke-width="5" stroke-linecap="round" stroke-dasharray="160" stroke-dashoffset="29"/>
          <defs><linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="var(--primary)"/><stop offset="100%" stop-color="var(--mint-300)"/></linearGradient></defs>
        </svg>
        <div class="v">82</div>
      </div>
      <div class="inf">
        <h3>肌肤状态良好</h3>
        <p>整体评分超过 78% 的用户</p>
        <div class="tg"><svg viewBox="0 0 12 12" stroke="#059669" stroke-width="2.5" fill="none"><path d="M6 9V3M3.5 5L6 2.5 8.5 5"/></svg>+4 较上次</div>
      </div>
    </div>

    <!-- Radar chart -->
    <div class="dc">
      <div class="section-header"><div class="title">多维评分</div></div>
      <div style="width:190px;height:190px;margin:0 auto 4px">
        <svg viewBox="0 0 190 190">
          <polygon points="95,15 163,40 163,103 95,128 27,103 27,40" fill="none" stroke="var(--outline-variant)" stroke-width="0.5"/>
          <polygon points="95,35 149,53 149,90 95,108 41,90 41,53" fill="none" stroke="var(--outline-variant)" stroke-width="0.5"/>
          <polygon points="95,55 135,66 135,77 95,88 55,77 55,66" fill="none" stroke="var(--outline-variant)" stroke-width="0.5"/>
          <line x1="95" y1="71" x2="95" y2="15" stroke="var(--outline-variant)" stroke-width="0.5"/>
          <line x1="95" y1="71" x2="163" y2="40" stroke="var(--outline-variant)" stroke-width="0.5"/>
          <line x1="95" y1="71" x2="163" y2="103" stroke="var(--outline-variant)" stroke-width="0.5"/>
          <line x1="95" y1="71" x2="95" y2="128" stroke="var(--outline-variant)" stroke-width="0.5"/>
          <line x1="95" y1="71" x2="27" y2="103" stroke="var(--outline-variant)" stroke-width="0.5"/>
          <line x1="95" y1="71" x2="27" y2="40" stroke="var(--outline-variant)" stroke-width="0.5"/>
          <polygon points="95,24 156,45 148,98 95,115 40,92 42,44" fill="var(--primary)" fill-opacity="0.08" stroke="var(--primary)" stroke-width="2"/>
          <circle cx="95" cy="24" r="4" fill="var(--primary)"/>
          <circle cx="156" cy="45" r="4" fill="var(--primary)"/>
          <circle cx="148" cy="98" r="4" fill="var(--primary)"/>
          <circle cx="95" cy="115" r="4" fill="var(--primary)"/>
          <circle cx="40" cy="92" r="4" fill="var(--primary)"/>
          <circle cx="42" cy="44" r="4" fill="var(--primary)"/>
          <text x="95" y="10" text-anchor="middle" font-size="11" fill="var(--on-surface-variant)" font-family="var(--font)" font-weight="600" stroke="none">整体</text>
          <text x="170" y="42" font-size="11" fill="var(--on-surface-variant)" font-family="var(--font)" font-weight="600" stroke="none">毛孔</text>
          <text x="170" y="108" font-size="11" fill="var(--on-surface-variant)" font-family="var(--font)" font-weight="600" stroke="none">泛红</text>
          <text x="95" y="142" text-anchor="middle" font-size="11" fill="var(--on-surface-variant)" font-family="var(--font)" font-weight="600" stroke="none">水润</text>
          <text x="8" y="108" font-size="11" fill="var(--on-surface-variant)" font-family="var(--font)" font-weight="600" stroke="none">均匀</text>
          <text x="8" y="42" font-size="11" fill="var(--on-surface-variant)" font-family="var(--font)" font-weight="600" stroke="none">痘痘</text>
        </svg>
      </div>
    </div>

    <!-- Metric bars -->
    <div class="dc">
      <div class="section-header"><div class="title">各项指标</div></div>
      <div class="mt"><div class="nm">痘痘</div><div class="bar"><div class="fl" style="width:85%;background:linear-gradient(90deg,#FF8A8A,var(--acne))"></div></div><div class="vl">85</div><div class="ch" style="color:var(--success)">+5</div></div>
      <div class="mt"><div class="nm">毛孔</div><div class="bar"><div class="fl" style="width:78%;background:linear-gradient(90deg,#7EDCD4,var(--pore))"></div></div><div class="vl">78</div><div class="ch" style="color:var(--success)">+3</div></div>
      <div class="mt"><div class="nm">均匀度</div><div class="bar"><div class="fl" style="width:82%;background:linear-gradient(90deg,#FFEE8D,var(--evenness))"></div></div><div class="vl">82</div><div class="ch" style="color:var(--success)">+6</div></div>
      <div class="mt"><div class="nm">泛红</div><div class="bar"><div class="fl" style="width:75%;background:linear-gradient(90deg,#F5A1A1,var(--redness))"></div></div><div class="vl">75</div><div class="ch" style="color:var(--on-surface-variant)">+1</div></div>
      <div class="mt"><div class="nm">水润</div><div class="bar"><div class="fl" style="width:80%;background:linear-gradient(90deg,#75C7E1,var(--hydration))"></div></div><div class="vl">80</div><div class="ch" style="color:var(--success)">+4</div></div>
    </div>

    <!-- AI Analysis -->
    <div class="ai-c">
      <div class="section-header"><div class="title">AI 分析</div></div>
      <div class="ai-b"><svg viewBox="0 0 14 14" style="color:var(--primary)"><circle cx="7" cy="7" r="6"/><path d="M5 7.5l1.5 1.5L9 6"/></svg> AI 智能生成</div>
      <div class="ai-t">整体状态很不错哦~ 痘痘较上次减少了约 30%，主要集中在下巴区域。肤色均匀度提升明显，说明当前的护肤方案很适合你，继续坚持!</div>
      <div class="ai-highlight">
        <strong>护肤建议:</strong> T 区毛孔稍需关注，可以试试含水杨酸的收敛精华，每周 2-3 次局部使用。
      </div>
    </div>

    <!-- Products used -->
    <div class="dc" style="margin-bottom:24px">
      <div class="section-header"><div class="title">当日使用产品</div><div class="action">编辑</div></div>
      <div>
        <span class="pc"><svg viewBox="0 0 16 16" width="14" height="14" style="color:var(--info)"><rect x="5" y="3" width="6" height="10" rx="2"/></svg>CeraVe 洁面乳</span>
        <span class="pc"><svg viewBox="0 0 16 16" width="14" height="14" style="color:#9C27B0"><circle cx="8" cy="6" r="3"/><path d="M8 9v4"/></svg>薇诺娜 精华液</span>
        <span class="pc"><svg viewBox="0 0 16 16" width="14" height="14" style="color:var(--apricot-400)"><circle cx="8" cy="8" r="5"/></svg>安耐晒 防晒霜</span>
        <span class="pc"><svg viewBox="0 0 16 16" width="14" height="14" style="color:var(--success)"><rect x="4" y="4" width="8" height="8" rx="3"/></svg>珂润 面霜</span>
      </div>
    </div>
  </div>
</div>
</body></html>
