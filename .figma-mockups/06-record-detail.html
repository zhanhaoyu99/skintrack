<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; }

/* Photo header */
.dp {
  height: 280px; position: relative; overflow: hidden; flex-shrink: 0;
  background: linear-gradient(180deg, #D4B8A8 0%, #C8A898 30%, #B8A088 60%, #A89480 100%);
}
.dp .face { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.dp .face svg { width: 180px; height: 230px; opacity: 0.06; }
.dp .bar {
  position: absolute; top: 0; left: 0; right: 0; height: var(--top-bar-height);
  padding: 0 var(--space-8); display: flex; align-items: center; justify-content: space-between; z-index: 5;
}
.dp .bar .btn-icon {
  width: 40px; height: 40px; border-radius: var(--radius-full);
  background: rgba(0,0,0,0.2); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
}
.dp .bar .btn-icon svg { width: var(--icon-size-sm); height: var(--icon-size-sm); color: white; }
.dp .date-tag {
  position: absolute; bottom: var(--space-12); left: var(--space-16);
  padding: var(--space-6) var(--space-12); border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.4); backdrop-filter: blur(12px);
  font-size: var(--font-c1-size); font-weight: 600; color: rgba(255,255,255,0.9);
}
.dp .score-tag {
  position: absolute; bottom: var(--space-12); right: var(--space-16);
  padding: var(--space-4) var(--space-12); border-radius: var(--radius-full);
  background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
  font-size: var(--font-c1-size); font-weight: 700; color: white;
}

/* Score overview card */
.so {
  margin: -40px var(--space-16) var(--space-12); padding: var(--space-20);
  background: var(--surface-primary); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md); border: var(--card-border-width) solid var(--border-subtle);
  display: flex; align-items: center; gap: var(--space-16); position: relative; z-index: 5;
}
.so .ring { width: 74px; height: 74px; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.so .ring .val { position: absolute; font-size: var(--font-num-lg-size); font-weight: var(--font-num-lg-weight); color: var(--content-brand); }
.so .info h2 { font-size: var(--font-h3-size); font-weight: 700; color: var(--content-primary); margin-bottom: var(--space-4); }
.so .info .sub { font-size: var(--font-b3-size); color: var(--content-secondary); margin-bottom: var(--space-6); }
.so .info .pill {
  display: inline-flex; align-items: center; gap: var(--space-4);
  padding: var(--space-2) var(--space-10); border-radius: var(--radius-full);
  font-size: var(--font-c1-size); font-weight: 600;
  background: var(--surface-success); color: var(--content-success);
}

/* Data card */
.dc {
  margin: 0 var(--space-16) var(--space-12); padding: var(--space-16);
  background: var(--surface-primary); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm); border: var(--card-border-width) solid var(--border-subtle);
}

/* Radar chart */
.radar { display: flex; justify-content: center; padding: var(--space-8) 0; }

/* Metric bar */
.mt { display: flex; align-items: center; gap: var(--space-10); padding: var(--space-10) 0; }
.mt + .mt { border-top: var(--card-border-width) solid var(--border-subtle); }
.mt .name { width: 36px; font-size: var(--font-b3-size); font-weight: 600; color: var(--content-secondary); flex-shrink: 0; }
.mt .bar { flex: 1; height: 8px; background: var(--surface-tertiary); border-radius: var(--radius-full); overflow: hidden; }
.mt .bar .fill { height: 100%; border-radius: var(--radius-full); }
.mt .val { width: 28px; text-align: right; font-size: var(--font-num-sm-size); font-weight: var(--font-num-sm-weight); color: var(--content-primary); }
.mt .change { width: 36px; text-align: right; font-size: var(--font-c1-size); font-weight: 600; }

/* AI card */
.ai-c {
  margin: 0 var(--space-16) var(--space-12); padding: var(--space-16);
  background: linear-gradient(135deg, var(--primary-50), var(--lavender-50));
  border-radius: var(--radius-lg); border: var(--card-border-width) solid rgba(42,157,124,0.08);
  position: relative;
}
.ai-badge {
  display: inline-flex; align-items: center; gap: var(--space-4);
  padding: var(--space-2) var(--space-10); border-radius: var(--radius-full);
  background: var(--surface-primary); font-size: var(--font-c2-size); font-weight: 600;
  color: var(--content-brand); margin-bottom: var(--space-12); box-shadow: var(--shadow-xs);
}
.ai-text { font-size: var(--font-b2-size); color: var(--content-primary); line-height: 1.6; }
.ai-highlight {
  margin-top: var(--space-12); padding: var(--space-10) var(--space-12);
  background: rgba(255,255,255,0.6); border-radius: var(--radius-sm);
  font-size: var(--font-b3-size); color: var(--content-brand); font-weight: 500;
  border-left: 3px solid var(--interactive-primary);
}

/* Product chips */
.pc {
  display: inline-flex; align-items: center; gap: var(--space-6);
  padding: var(--space-6) var(--space-12); border-radius: var(--radius-full);
  background: var(--surface-secondary); font-size: var(--font-c1-size); font-weight: 500;
  color: var(--content-primary); border: var(--card-border-width) solid var(--border-subtle);
}
.pc svg { width: 14px; height: 14px; }
</style>
</head>
<body>

<div>
<div class="phone-label">Record Detail</div>
<div class="phone-frame" style="flex-direction:column">
  <!-- Photo Header -->
  <div class="dp">
    <div class="status-bar light" style="position:absolute;top:0;left:0;right:0;z-index:10"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="white" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="white" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="white"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="white" opacity="0.4" stroke="none"/></svg></div></div>
    <div class="bar" style="top:var(--status-bar-height)">
      <div class="btn-icon"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
      <div class="btn-icon"><svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></div>
    </div>
    <div class="face"><svg viewBox="0 0 100 130" fill="none" stroke="white" stroke-width="0.8"><ellipse cx="50" cy="60" rx="35" ry="45"/><circle cx="35" cy="52" r="3"/><circle cx="65" cy="52" r="3"/><path d="M42 75c4 5 12 5 16 0"/></svg></div>
    <div class="date-tag">2026.03.14 09:15</div>
    <div class="score-tag">82 分</div>
  </div>

  <div class="content-no-padding" style="flex:1;overflow-y:auto">
    <!-- Score Overview -->
    <div class="so">
      <div class="ring">
        <svg width="74" height="74" viewBox="0 0 74 74"><circle cx="37" cy="37" r="30" fill="none" stroke="var(--surface-tertiary)" stroke-width="5"/><circle cx="37" cy="37" r="30" fill="none" stroke="var(--primary-400)" stroke-width="5" stroke-linecap="round" stroke-dasharray="188" stroke-dashoffset="34" transform="rotate(-90 37 37)"/></svg>
        <span class="val">82</span>
      </div>
      <div class="info">
        <h2>皮肤状态不错哦</h2>
        <div class="sub">超过 75% 的同龄用户</div>
        <div class="pill">&#8593; 较上次 +3</div>
      </div>
    </div>

    <!-- Radar Chart -->
    <div class="dc">
      <div class="section-header"><span class="title">多维分析</span></div>
      <div class="radar">
        <svg width="190" height="190" viewBox="0 0 190 190">
          <!-- 3-layer hexagons -->
          <polygon points="95,15 160,42 160,108 95,135 30,108 30,42" fill="none" stroke="var(--border-subtle)" stroke-width="0.5"/>
          <polygon points="95,35 145,55 145,100 95,120 45,100 45,55" fill="none" stroke="var(--border-subtle)" stroke-width="0.5"/>
          <polygon points="95,55 130,68 130,92 95,105 60,92 60,68" fill="none" stroke="var(--border-subtle)" stroke-width="0.5"/>
          <!-- Axes -->
          <line x1="95" y1="15" x2="95" y2="135" stroke="var(--border-subtle)" stroke-width="0.3"/>
          <line x1="30" y1="42" x2="160" y2="108" stroke="var(--border-subtle)" stroke-width="0.3"/>
          <line x1="30" y1="108" x2="160" y2="42" stroke="var(--border-subtle)" stroke-width="0.3"/>
          <!-- Data fill -->
          <polygon points="95,22 152,48 148,102 95,122 40,96 42,46" fill="var(--primary-400)" fill-opacity="0.08" stroke="var(--primary-400)" stroke-width="2"/>
          <!-- Vertex dots -->
          <circle cx="95" cy="22" r="4" fill="var(--primary-400)"/>
          <circle cx="152" cy="48" r="4" fill="var(--primary-400)"/>
          <circle cx="148" cy="102" r="4" fill="var(--primary-400)"/>
          <circle cx="95" cy="122" r="4" fill="var(--primary-400)"/>
          <circle cx="40" cy="96" r="4" fill="var(--primary-400)"/>
          <circle cx="42" cy="46" r="4" fill="var(--primary-400)"/>
          <!-- Labels -->
          <text x="95" y="8" text-anchor="middle" font-size="10" fill="var(--content-secondary)" font-weight="600" stroke="none" font-family="var(--font-family)">整体</text>
          <text x="168" y="48" text-anchor="start" font-size="10" fill="var(--content-secondary)" font-weight="600" stroke="none" font-family="var(--font-family)">毛孔</text>
          <text x="168" y="108" text-anchor="start" font-size="10" fill="var(--content-secondary)" font-weight="600" stroke="none" font-family="var(--font-family)">泛红</text>
          <text x="95" y="148" text-anchor="middle" font-size="10" fill="var(--content-secondary)" font-weight="600" stroke="none" font-family="var(--font-family)">水润</text>
          <text x="22" y="108" text-anchor="end" font-size="10" fill="var(--content-secondary)" font-weight="600" stroke="none" font-family="var(--font-family)">均匀</text>
          <text x="22" y="48" text-anchor="end" font-size="10" fill="var(--content-secondary)" font-weight="600" stroke="none" font-family="var(--font-family)">痘痘</text>
        </svg>
      </div>
    </div>

    <!-- Metric Bars -->
    <div class="dc">
      <div class="section-header"><span class="title">指标详情</span></div>
      <div class="mt"><span class="name">痘痘</span><div class="bar"><div class="fill" style="width:85%;background:linear-gradient(90deg,rgba(242,122,142,0.3),var(--metric-acne))"></div></div><span class="val">85</span><span class="change" style="color:var(--content-success)">+3</span></div>
      <div class="mt"><span class="name">毛孔</span><div class="bar"><div class="fill" style="width:78%;background:linear-gradient(90deg,rgba(78,205,196,0.3),var(--metric-pore))"></div></div><span class="val">78</span><span class="change" style="color:var(--content-success)">+5</span></div>
      <div class="mt"><span class="name">均匀</span><div class="bar"><div class="fill" style="width:82%;background:linear-gradient(90deg,rgba(245,197,66,0.3),var(--metric-evenness))"></div></div><span class="val">82</span><span class="change" style="color:var(--content-success)">+2</span></div>
      <div class="mt"><span class="name">泛红</span><div class="bar"><div class="fill" style="width:75%;background:linear-gradient(90deg,rgba(232,120,120,0.3),var(--metric-redness))"></div></div><span class="val">75</span><span class="change" style="color:var(--content-tertiary)">0</span></div>
      <div class="mt"><span class="name">水润</span><div class="bar"><div class="fill" style="width:80%;background:linear-gradient(90deg,rgba(69,183,209,0.3),var(--metric-hydration))"></div></div><span class="val">80</span><span class="change" style="color:var(--content-success)">+4</span></div>
    </div>

    <!-- AI Analysis -->
    <div class="ai-c">
      <div class="ai-badge">
        <svg viewBox="0 0 12 12" width="10" height="10" fill="var(--primary-400)" stroke="none"><circle cx="6" cy="6" r="5"/><path d="M4 6l1.5 1.5L8.5 4.5" stroke="white" stroke-width="1.5" fill="none"/></svg>
        AI 智能生成
      </div>
      <div class="ai-text">你的肌肤整体状态良好，水润度和痘痘指标有明显改善。毛孔方面也有收紧趋势，建议继续保持当前的护肤方案。</div>
      <div class="ai-highlight">建议：可以适当增加含烟酰胺成分的精华，帮助进一步改善毛孔和均匀度~</div>
    </div>

    <!-- Products Used -->
    <div class="dc" style="margin-bottom:var(--space-32)">
      <div class="section-header"><span class="title">使用产品</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:var(--space-8)">
        <div class="pc"><svg viewBox="0 0 14 14" style="color:var(--lavender-400)"><rect x="3" y="2" width="8" height="10" rx="2"/><line x1="7" y1="5" x2="7" y2="9"/></svg>烟酰胺精华</div>
        <div class="pc"><svg viewBox="0 0 14 14" style="color:var(--primary-400)"><rect x="3" y="3" width="8" height="8" rx="3"/></svg>水乳面霜</div>
        <div class="pc"><svg viewBox="0 0 14 14" style="color:var(--secondary-400)"><circle cx="7" cy="7" r="4"/><path d="M7 3v1M7 10v1M3 7h1M10 7h1"/></svg>防晒霜 SPF50</div>
        <div class="pc"><svg viewBox="0 0 14 14" style="color:var(--info-400)"><rect x="4" y="2" width="6" height="10" rx="1.5"/></svg>氨基酸洁面</div>
      </div>
    </div>
  </div>
</div>
</div>

</body>
</html>
