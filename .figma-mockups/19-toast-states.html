<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: 32px; padding: 32px; flex-wrap: wrap; justify-content: center; }
.phone-frame { flex-shrink: 0; }

/* Toast base */
.toast {
  position: absolute; left: 16px; right: 16px; z-index: 50;
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; border-radius: var(--r-lg);
  background: rgba(255,255,255,0.82); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow-lg); font-family: var(--font);
}
.toast-top { top: 62px; }
.toast-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.toast-text { font-size: 14px; font-weight: 500; color: var(--on-surface); flex: 1; line-height: 1.4; }

/* Snackbar */
.snackbar {
  position: absolute; left: 16px; right: 16px; bottom: 92px; z-index: 50;
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; border-radius: var(--r-lg);
  background: rgba(17,24,39,0.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow-lg);
}
.snackbar-text { font-size: 14px; color: rgba(255,255,255,0.92); flex: 1; }
.snackbar-action { font-size: 14px; font-weight: 600; color: var(--mint-200); flex-shrink: 0; cursor: pointer; }

/* Warning banner */
.warning-banner {
  margin: 0 16px 12px; padding: 12px 14px; border-radius: var(--r-md);
  background: #FFFBEB; border: 1px solid #FDE68A;
  display: flex; align-items: flex-start; gap: 10px;
}
.warning-banner-icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--warning); margin-top: 1px; }
.warning-banner-text { font-size: 13px; color: #92400E; line-height: 1.5; }

/* AI progress */
.ai-progress-card {
  margin: 0 16px 12px; padding: 16px; border-radius: var(--r-lg);
  background: linear-gradient(135deg, #F5FAF8, #F8F5FC); box-shadow: var(--shadow-sm);
}
.ai-progress-label { font-size: 14px; font-weight: 500; color: var(--on-surface); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.progress-bar-track { height: 6px; background: var(--outline-variant); border-radius: var(--r-full); overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: var(--r-full); background: var(--grad-primary); }
.progress-pct { font-size: 12px; color: var(--on-surface-variant); margin-top: 6px; text-align: right; }

/* Spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { animation: spin 1s linear infinite; flex-shrink: 0; }

/* Error inline */
.mock-input { margin: 0 16px 4px; padding: 14px 16px; border-radius: var(--r-md); border: 1.5px solid var(--error); background: var(--surface); font-size: 15px; color: var(--on-surface); font-family: var(--font); }
.inline-error { margin: 0 16px 16px; font-size: 12px; color: var(--error); padding-left: 2px; }

/* Network error full screen */
.error-full { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 40px 32px; text-align: center; }
.error-full-icon { width: 80px; height: 80px; border-radius: 50%; background: #FEE2E2; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
.error-full-title { font-size: 18px; font-weight: 600; color: var(--on-surface); margin-bottom: 8px; }
.error-full-desc { font-size: 14px; color: var(--on-surface-variant); margin-bottom: 28px; line-height: 1.5; }
.error-full-btn { padding: 14px 40px; border-radius: var(--r-full); background: var(--grad-primary); color: white; font-size: 15px; font-weight: 600; border: none; box-shadow: var(--shadow-md); cursor: pointer; }
</style>
</head>
