<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; }

/* Toast positioned at bottom of phone */
.toast-pos {
  position: absolute; bottom: calc(var(--bottom-nav-height) + var(--space-12));
  left: var(--space-16); right: var(--space-16); z-index: 50;
  animation: slide-up var(--duration-normal) var(--easing-decelerate) both;
}

/* Enhanced toast */
.toast-enhanced {
  display: flex; align-items: center; gap: var(--space-12);
  padding: var(--space-12) var(--space-16); border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg); font-size: var(--font-b2-size); font-weight: 500;
}
.toast-enhanced svg { width: var(--icon-size-sm); height: var(--icon-size-sm); flex-shrink: 0; }
.toast-enhanced .text { flex: 1; }
.toast-enhanced .action-text {
  font-size: var(--font-b3-size); font-weight: 700; cursor: pointer; flex-shrink: 0;
}

.toast-success-e { background: var(--success-600); color: var(--content-inverse); }
.toast-success-e .action-text { color: var(--success-100); }
.toast-error-e { background: var(--error-500); color: var(--content-inverse); }
.toast-error-e .action-text { color: var(--error-100); }
.toast-warning-e { background: var(--warning-500); color: var(--neutral-900); }
.toast-warning-e .action-text { color: var(--warning-900); }

/* Faded background for context */
.bg-faded { opacity: 0.3; pointer-events: none; }
</style>
</head>
<body>

<!-- ═══════ TOAST: SUCCESS ═══════ -->
<div>
<div class="phone-label">Toast — Success</div>
<div class="phone-frame" style="position:relative">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="top-app-bar bg-faded"><span class="title">首页</span></div>
  <div class="content bg-faded"><div style="height:200px;background:var(--surface-secondary);border-radius:var(--radius-lg);margin-bottom:var(--space-12)"></div></div>

  <!-- Success toast -->
  <div class="toast-pos">
    <div class="toast-enhanced toast-success-e">
      <svg viewBox="0 0 24 24" style="stroke:white"><circle cx="12" cy="12" r="10"/><polyline points="16 8 10 16 7 13"/></svg>
      <span class="text">照片已保存，分析完成!</span>
      <span class="action-text">查看</span>
    </div>
  </div>

  <div class="bottom-nav bg-faded">
    <div class="ni active"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="var(--interactive-primary)" stroke="var(--interactive-primary)" stroke-width="1.5"/><polyline points="9 22 9 12 15 12 15 22" stroke="white" stroke-width="1.5" fill="none"/></svg><div class="label">首页</div></div>
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><div class="label">记录</div></div>
    <div class="ni-fab"><div class="fab"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><div class="label">拍照</div></div>
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 4 5-8"/></svg><div class="label">分析</div></div>
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><div class="label">我的</div></div>
  </div>
</div>
</div>

  <div class="top-app-bar bg-faded"><span class="title">拍照</span></div>

  <div class="toast-pos">
    <div class="toast-enhanced toast-error-e">
      <svg viewBox="0 0 24 24" style="stroke:white"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span class="text">分析失败，请重试</span>

  </div>

  <div class="bottom-nav bg-faded">
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><div class="label">首页</div></div>
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><div class="label">记录</div></div>
    <div class="ni-fab"><div class="fab"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><div class="label">拍照</div></div>
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 4 5-8"/></svg><div class="label">分析</div></div>
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><div class="label">我的</div></div>
  </div>
</div>
</div>

<!-- ═══════ TOAST: WARNING ═══════ -->
<div>
<div class="phone-label">Toast — Warning</div>
<div class="phone-frame" style="position:relative">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="top-app-bar bg-faded"><span class="title">设置</span></div>
  <div class="content bg-faded"><div style="height:200px;background:var(--surface-secondary);border-radius:var(--radius-lg);margin-bottom:var(--space-12)"></div></div>

  <div class="toast-pos">
    <div class="toast-enhanced toast-warning-e">
      <svg viewBox="0 0 24 24" style="stroke:var(--neutral-900)"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

  <div class="bottom-nav bg-faded">
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><div class="label">首页</div></div>

    <div class="ni-fab"><div class="fab"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><div class="label">拍照</div></div>
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 4 5-8"/></svg><div class="label">分析</div></div>
    <div class="ni"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><div class="label">我的</div></div>

</div>
</div>

</body>
</html>
