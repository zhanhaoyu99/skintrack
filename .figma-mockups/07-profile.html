<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; }

/* Profile header gradient */
.profile-header {
  background: var(--grad-profile); padding: 0 var(--space-20) var(--space-24);
  position: relative; overflow: hidden;
}
.profile-header::before {
  content: ''; position: absolute; top: -40px; right: -30px;
  width: 140px; height: 140px; border-radius: var(--radius-full); background: rgba(255,255,255,0.06);
}
.profile-header::after {
  content: ''; position: absolute; bottom: -50px; left: -20px;
  width: 120px; height: 120px; border-radius: var(--radius-full); background: rgba(255,255,255,0.04);
}

/* User card */
.user-card { display: flex; align-items: center; gap: var(--space-16); position: relative; z-index: 1; }
.user-avatar {
  width: 56px; height: 56px; border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--rose-300), var(--rose-400));
  display: flex; align-items: center; justify-content: center;
  font-size: var(--font-h3-size); font-weight: 700; color: var(--content-inverse);
  box-shadow: 0 4px 16px rgba(242,122,142,0.3);
  border: 2px solid rgba(255,255,255,0.3);
}
.user-info { flex: 1; }
.user-name { font-size: var(--font-h3-size); font-weight: 700; color: var(--content-inverse); }
.user-email { font-size: var(--font-b3-size); color: rgba(255,255,255,0.7); margin-top: var(--space-2); }
.user-tags { display: flex; gap: var(--space-6); margin-top: var(--space-6); }
.vip-badge {
  padding: var(--space-2) var(--space-10); border-radius: var(--radius-full);
  background: var(--gold-gradient); font-size: var(--font-c2-size);
  font-weight: 700; color: var(--gold-text); box-shadow: var(--shadow-gold-sm);
}
.skin-tag {
  padding: var(--space-2) var(--space-10); border-radius: var(--radius-full);
  background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
  font-size: var(--font-c2-size); font-weight: 600; color: rgba(255,255,255,0.85);
}

/* Stats glass card */
.stats-glass {
  margin: -16px var(--space-16) var(--space-12); padding: var(--space-16);
  background: var(--surface-primary); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md); border: var(--card-border-width) solid var(--border-subtle);
  display: flex; position: relative; z-index: 5;
}
.stats-glass::before {
  content: ''; position: absolute; top: 0; left: var(--space-20); right: var(--space-20);
  height: 2px; border-radius: 0 0 2px 2px; background: var(--grad-primary);
}
.stat-item {
  flex: 1; text-align: center; position: relative;
  display: flex; flex-direction: column; align-items: center; gap: var(--space-4);
}
.stat-item + .stat-item::before {
  content: ''; position: absolute; left: 0; top: 10%; height: 80%;
  width: var(--card-border-width); background: var(--border-subtle);
}
.stat-item .stat-val { font-size: var(--font-h3-size); font-weight: 800; color: var(--content-primary); }
.stat-item .stat-lbl { font-size: var(--font-c2-size); font-weight: 600; color: var(--content-tertiary); }

/* Goals card */
.goals-card {
  margin: 0 var(--space-16) var(--space-12); padding: var(--space-16);
  background: var(--surface-primary); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm); border: var(--card-border-width) solid var(--border-subtle);
}
.goal-tags { display: flex; flex-wrap: wrap; gap: var(--space-8); margin-top: var(--space-12); }
.goal-tag {
  padding: var(--space-6) var(--space-12); border-radius: var(--radius-full);
  font-size: var(--font-b3-size); font-weight: 600;
}
.goal-add {
  padding: var(--space-6) var(--space-12); border-radius: var(--radius-full);
  font-size: var(--font-b3-size); font-weight: 600;
  border: 1.5px dashed var(--border-default); color: var(--content-tertiary);
  background: transparent; cursor: pointer;
}

/* Menu section */
.msec {
  margin: 0 var(--space-16) var(--space-12); padding: var(--space-4) var(--space-16);
  background: var(--surface-primary); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm); border: var(--card-border-width) solid var(--border-subtle);
}

/* Footer */
.app-footer {
  display: flex; flex-direction: column; align-items: center; gap: var(--space-4);
  padding: var(--space-16) 0 var(--space-8);
}
.logo-mark {
  width: 28px; height: 28px; border-radius: var(--radius-sm);
  background: var(--grad-primary); display: flex; align-items: center; justify-content: center;
}
.logo-mark svg { width: 16px; height: 16px; color: white; stroke-width: 2.5; }
</style>
</head>
<body>

<div>
