<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: 32px; padding: 32px; justify-content: center; }
.phone-frame { flex-shrink: 0; }

/* ===== Profile Header with gradient extending behind status bar ===== */
.profile-header {
  background: var(--grad-hero);
  padding: 0 0 52px;
  position: relative;
  overflow: hidden;
  margin-bottom: -36px;
}
.profile-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.profile-header::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -20px;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.profile-header .status-bar .time { color: #fff; }
.profile-header .status-bar svg { fill: #fff !important; }
.profile-header .top-app-bar .title { color: #fff; }
.profile-header .top-app-bar .action svg { color: rgba(255,255,255,0.8) !important; }

/* User card inside header */
.user-card {
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px; position: relative; z-index: 2;
}
.user-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, #FDA4AF, #FB7185);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 800; color: white;
  flex-shrink: 0;
  border: 3px solid rgba(255,255,255,0.35);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.user-info { flex: 1; color: white; z-index: 1; }
.user-name {
  font-size: 22px; font-weight: 800; letter-spacing: -0.4px;
  display: flex; align-items: center; gap: 8px;
}
.vip-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: var(--r-full);
  background: linear-gradient(135deg, #FFD700, #FFA500);
  font-size: 11px; font-weight: 800; color: #7B4C00;
  letter-spacing: 0.3px;
  box-shadow: 0 2px 8px rgba(255,165,0,0.35);
}
.vip-badge svg { width: 12px; height: 12px; fill: #7B4C00; stroke: none; }
.user-email { font-size: 13px; opacity: 0.75; margin-top: 3px; }
.user-tags {
  display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
}
.user-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 12px; border-radius: var(--r-full);
  background: rgba(255,255,255,0.18); backdrop-filter: blur(4px);
  font-size: 12px; font-weight: 600; color: white;
}
.user-arrow {
  z-index: 1; opacity: 0.6;
}
.user-arrow svg { width: 20px; height: 20px; color: white; }

/* ===== Frosted glass stats card ===== */
.stats-glass {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-radius: var(--r-xl);
  padding: 18px 12px;
  margin: 0 16px 16px;
  display: flex; text-align: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  border: 0.5px solid rgba(255,255,255,0.6);
  position: relative; z-index: 5;
}
.stat-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.stat-icon {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 2px;
}
.stat-icon svg { width: 16px; height: 16px; }
.stat-value {
  font-size: 24px; font-weight: 800; color: var(--on-surface); letter-spacing: -0.5px;
}
.stat-value.mint { color: var(--primary); }
.stat-value.orange { color: var(--apricot-400); }
.stat-label {
  font-size: 11px; color: var(--on-surface-variant); font-weight: 600;
}
.stat-divider {
  width: 0.5px; background: var(--outline-variant); margin: 8px 0;
}
/* Mini score ring */
.stat-ring { width: 34px; height: 34px; position: relative; margin-bottom: 2px; }
.stat-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
.stat-ring .ring-val {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 11px; font-weight: 800; color: var(--on-surface);
}

/* ===== Skin Goals ===== */
.goals-card {
  background: var(--surface); border-radius: var(--r-lg);
  padding: 14px 16px; margin: 0 16px 12px;
  box-shadow: var(--shadow-sm);
}
.goals-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
}
.goals-header .t { font-size: 15px; font-weight: 700; color: var(--on-surface); }
.goals-header .a { font-size: 13px; color: var(--primary); font-weight: 600; }
.goal-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.goal-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; border-radius: var(--r-full);
  font-size: 13px; font-weight: 600;
}

/* ===== Menu Sections ===== */
.msec {
  background: var(--surface); border-radius: var(--r-lg);
  padding: 2px 16px; margin: 0 16px 12px;
  box-shadow: var(--shadow-sm);
}

/* ===== App version footer ===== */
.app-footer {
  text-align: center; padding: 20px 16px 100px;
}
.app-footer .logo-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--grad-primary); margin-bottom: 8px;
}
.app-footer .logo-mark svg { width: 18px; height: 18px; stroke: white; stroke-width: 2.5; }
.app-footer .app-name {
  font-size: 13px; font-weight: 700; color: var(--on-surface-variant); letter-spacing: 0.5px;
}
.app-footer .app-ver {
  font-size: 12px; color: var(--outline); margin-top: 2px; font-weight: 500;
}
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Profile Header with gradient behind status bar -->
  <div class="profile-header">
    <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="white" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="white" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="white"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="white" opacity="0.4" stroke="none"/></svg></div></div>

    </div>
    <!-- User info -->
    <div class="user-card">
      <div class="user-avatar">L</div>
      <div class="user-info">
        <div class="user-name">Lisa <span class="vip-badge"><svg viewBox="0 0 14 14"><path d="M7 1l1.8 3.7L13 5.4l-3 2.9.7 4L7 10.3 3.3 12.3l.7-4-3-2.9 4.2-.7z"/></svg>VIP</span></div>

      <div class="menu-item"><div class="icon-wrap" style="background:linear-gradient(135deg,#FEF3C7,#FDE68A)"><svg viewBox="0 0 24 24" style="color:#D97706"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26" fill="#D97706" stroke="none"/></svg></div><div class="text"><div class="primary-text">会员中心</div><div class="secondary-text">Pro 会员 · 2026.12.14 到期</div></div><div class="trailing"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div></div>
