<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; }

/* Hero */
.pw-hero {
  padding: var(--space-32) var(--space-16) var(--space-24); text-align: center;
  background: var(--grad-paywall); position: relative; overflow: hidden;
}
.pw-hero::before { content:''; position:absolute; top:-40px; right:-20px; width:120px; height:120px; border-radius:var(--radius-full); background:rgba(255,255,255,0.06); }
.pw-hero::after { content:''; position:absolute; bottom:-30px; left:-10px; width:80px; height:80px; border-radius:var(--radius-full); background:rgba(255,255,255,0.04); }

.pw-crown {
  width: 80px; height: 80px; border-radius: var(--radius-full);
  background: var(--gold-gradient);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto var(--space-16); box-shadow: 0 8px 32px rgba(255,215,0,0.3);
  animation: crown-glow 2s ease-in-out infinite;
}
@keyframes crown-glow {
  0%,100% { box-shadow: 0 8px 32px rgba(255,215,0,0.3); }
  50% { box-shadow: 0 8px 40px rgba(255,215,0,0.5); }
}
.pw-crown svg { width: var(--icon-size-lg); height: var(--icon-size-lg); color: white; fill: white; stroke: none; }

.pw-title { font-size: var(--font-h2-size); font-weight: 800; color: var(--content-inverse); margin-bottom: var(--space-8); letter-spacing: var(--font-h2-ls); position: relative; z-index: 1; }
.pw-desc { font-size: var(--font-b2-size); color: rgba(255,255,255,0.7); line-height: var(--font-b2-lh); position: relative; z-index: 1; }

/* Trial badge */
.trial-badge {
  display: inline-flex; align-items: center; gap: var(--space-4);
  padding: var(--space-4) var(--space-16); border-radius: var(--radius-full);
  background: var(--surface-success); color: var(--content-success);
  font-size: var(--font-c1-size); font-weight: 600; margin: var(--space-16) auto 0;
  position: relative; z-index: 1;
}

/* Avatars */
.avatars { display: flex; justify-content: center; margin: var(--space-16) 0 var(--space-4); }
.avatars .av {
  width: 28px; height: 28px; border-radius: var(--radius-full);
  border: 2px solid var(--surface-primary); margin-left: -8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--content-inverse);
}
.avatars .av:first-child { margin-left: 0; }
.social-text { font-size: var(--font-c1-size); color: var(--content-tertiary); text-align: center; margin-bottom: var(--space-20); }

/* Benefits */
.ben { display: flex; align-items: center; gap: var(--space-12); padding: var(--space-10) 0; }
.ben .ck {
  width: 24px; height: 24px; border-radius: var(--radius-full);
  background: var(--surface-brand-subtle); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.ben .ck svg { width: 14px; height: 14px; color: var(--content-brand); stroke-width: 3; }
.ben .text { font-size: var(--font-b2-size); color: var(--content-primary); font-weight: 500; }

/* Plans */
.plans { display: flex; gap: var(--space-10); margin: var(--space-20) 0 var(--space-16); }
.plan {
  flex: 1; padding: var(--space-16); border-radius: var(--radius-lg);
  border: 1.5px solid var(--border-default); position: relative; cursor: pointer;
  transition: all var(--duration-fast) var(--easing-standard);
}
.plan.sel {
  border-color: var(--interactive-primary); background: var(--surface-brand-subtle);
  box-shadow: var(--shadow-brand-sm);
}
.plan.sel::before {
  content: ''; position: absolute; top: 0; left: var(--space-16); right: var(--space-16);
  height: 2px; border-radius: 0 0 2px 2px; background: var(--grad-primary);
}
.plan .plan-price { font-size: var(--font-num-lg-size); font-weight: var(--font-num-lg-weight); color: var(--content-primary); }
.plan .plan-unit { font-size: var(--font-c1-size); color: var(--content-tertiary); font-weight: 500; }
.plan .plan-name { font-size: var(--font-b3-size); color: var(--content-secondary); margin-top: var(--space-4); }
.plan .plan-save {
  position: absolute; top: -8px; right: var(--space-8);
  padding: var(--space-2) var(--space-8); border-radius: var(--radius-full);
  background: var(--rose-400); color: var(--content-inverse);
  font-size: 9px; font-weight: 700;
}

/* Trust signals */
.trust-row { display: flex; justify-content: center; gap: var(--space-24); margin: var(--space-16) 0; }
.trust-item { display: flex; flex-direction: column; align-items: center; gap: var(--space-4); }
.trust-item svg { width: var(--icon-size-sm); height: var(--icon-size-sm); color: var(--content-tertiary); }
.trust-item span { font-size: var(--font-c2-size); color: var(--content-tertiary); font-weight: 500; }
</style>
</head>
<body>

<div>
<div class="phone-label">Paywall</div>
<div class="phone-frame">
  <!-- Hero -->
  <div class="pw-hero">
    <div class="status-bar light"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="white" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="white" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="white"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="white" opacity="0.4" stroke="none"/></svg></div></div>

    <!-- Close button -->
    <div style="position:absolute;top:calc(var(--status-bar-height) + 8px);left:var(--space-8);width:40px;height:40px;border-radius:var(--radius-full);background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;z-index:5"><svg viewBox="0 0 24 24" width="20" height="20" style="color:white"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>

    <div class="pw-crown"><svg viewBox="0 0 24 24"><path d="M2 6l4 8 6-6 6 6 4-8v12H2V6z"/></svg></div>
    <div class="pw-title">解锁全部功能</div>
    <div class="pw-desc">AI 深度分析 · 无限记录 · 归因报告</div>
    <div class="trial-badge">
      <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="var(--content-success)" stroke-width="2"><circle cx="6" cy="6" r="4"/><path d="M6 4v2l1.5 1"/></svg>
      新用户 14 天免费试用
    </div>
  </div>

  <div class="content" style="padding-top:var(--space-12)">
    <!-- Social proof -->
    <div class="avatars">
      <div class="av" style="background:linear-gradient(135deg,var(--rose-300),var(--rose-400))">L</div>
      <div class="av" style="background:linear-gradient(135deg,var(--primary-300),var(--primary-400))">M</div>
      <div class="av" style="background:linear-gradient(135deg,var(--lavender-300),var(--lavender-400))">S</div>
      <div class="av" style="background:linear-gradient(135deg,var(--secondary-300),var(--secondary-400))">J</div>
      <div class="av" style="background:var(--surface-tertiary);color:var(--content-tertiary);font-size:8px">+1K</div>
    </div>
    <div class="social-text">12,580 位用户已订阅</div>

    <!-- Benefits -->
    <div style="margin-bottom:var(--space-4)">
      <div class="ben"><div class="ck"><svg viewBox="0 0 14 14"><polyline points="3 7 5.5 9.5 11 4"/></svg></div><div class="text">无限次 AI 肌肤分析</div></div>
      <div class="ben"><div class="ck"><svg viewBox="0 0 14 14"><polyline points="3 7 5.5 9.5 11 4"/></svg></div><div class="text">完整归因分析报告</div></div>
      <div class="ben"><div class="ck"><svg viewBox="0 0 14 14"><polyline points="3 7 5.5 9.5 11 4"/></svg></div><div class="text">雷达图 + 多维深度分析</div></div>
      <div class="ben"><div class="ck"><svg viewBox="0 0 14 14"><polyline points="3 7 5.5 9.5 11 4"/></svg></div><div class="text">精美对比卡分享</div></div>
      <div class="ben"><div class="ck"><svg viewBox="0 0 14 14"><polyline points="3 7 5.5 9.5 11 4"/></svg></div><div class="text">云端备份 · 永不丢失</div></div>
    </div>

    <!-- Plans -->
    <div class="plans">
      <div class="plan">
        <div class="plan-price">¥19.9<span class="plan-unit">/月</span></div>
        <div class="plan-name">月度订阅</div>
      </div>
      <div class="plan sel">
        <div class="plan-save">省 ¥70.8</div>
        <div class="plan-price">¥168<span class="plan-unit">/年</span></div>
        <div class="plan-name">年度订阅 · 推荐</div>
      </div>
    </div>

    <!-- CTA -->
    <button class="btn btn-primary" style="margin-bottom:var(--space-12)">立即订阅</button>

    <!-- Trust -->
    <div class="trust-row">
      <div class="trust-item"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>安全支付</span></div>
      <div class="trust-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>随时取消</span></div>
      <div class="trust-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>即时生效</span></div>
    </div>

    <button class="btn btn-text" style="font-size:var(--font-b3-size);color:var(--content-tertiary)">恢复购买</button>
    <p style="font-size:var(--font-c2-size);color:var(--content-disabled);text-align:center;margin-top:var(--space-8);line-height:1.4">订阅即同意《服务条款》和《隐私政策》<br>自动续费，可随时取消</p>
  </div>
</div>
</div>

</body>
</html>
