<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: 32px; padding: 32px; justify-content: center; }
.phone-frame { flex-shrink: 0; }
.pw { flex: 1; min-height: 0; display: flex; flex-direction: column; background: var(--surface); overflow-y: auto; }

/* Hero section with gradient background */
.pw-hero { text-align: center; padding: 16px 32px 24px; position: relative; overflow: hidden; flex-shrink: 0;
  background: linear-gradient(180deg, var(--rose-50) 0%, var(--lavender-50) 40%, transparent 100%);
}
.pw-hero::before { content: ''; position: absolute; top: -60px; right: -40px; width: 180px; height: 180px; border-radius: 50%; background: rgba(251,113,133,0.04); }
.pw-hero::after { content: ''; position: absolute; top: -30px; left: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(196,181,253,0.05); }

/* Crown with glow */
.pw-crown { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; position: relative; z-index: 1;
  background: linear-gradient(145deg, #FFD700 0%, #FFAA00 50%, #FF8C00 100%);
  box-shadow: 0 8px 32px rgba(255,170,0,0.35), 0 0 60px rgba(255,170,0,0.1);
}
.pw-crown svg { width: 38px; height: 38px; color: white; stroke-width: 1.8; }

.pw-hero h1 { font-size: 26px; font-weight: 800; color: var(--on-surface); letter-spacing: -0.6px; margin-bottom: 8px; position: relative; z-index: 1; line-height: 1.3; }
.pw-hero p { font-size: 14px; color: var(--on-surface-variant); position: relative; z-index: 1; line-height: 1.5; }

/* Trial badge */
.trial-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: var(--r-full); font-size: 13px; font-weight: 700; margin-top: 12px; position: relative; z-index: 1;
  background: linear-gradient(135deg, #ECFDF5, #D1FAE5); color: #059669;
}
.trial-badge svg { width: 14px; height: 14px; }

/* Social proof */
.social-proof { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 0 0; position: relative; z-index: 1; }
.avatars { display: flex; }
.avatars .av { width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; margin-left: -8px; }
.avatars .av:first-child { margin-left: 0; }
.social-proof .text { font-size: 12px; color: var(--on-surface-variant); }
.social-proof .text strong { color: var(--on-surface); font-weight: 700; }

/* Benefits */
.bens { padding: 4px 28px 20px; flex-shrink: 0; }
.ben { display: flex; align-items: flex-start; gap: 14px; padding: 11px 0; }
.ben .ck { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
  background: linear-gradient(135deg, var(--mint-50), var(--primary-container));
}
.ben .ck svg { width: 14px; height: 14px; color: var(--primary); stroke-width: 3; }
.ben .tx { flex: 1; }
.ben .tx .main { font-size: 15px; color: var(--on-surface); font-weight: 600; }
.ben .tx .sub { font-size: 12px; color: var(--on-surface-variant); margin-top: 2px; }

/* Plans */
.plans { display: flex; gap: 12px; padding: 0 28px; margin-bottom: 20px; flex-shrink: 0; }
.plan { flex: 1; border: 2px solid var(--outline-variant); border-radius: var(--r-lg); padding: 18px 12px; text-align: center; position: relative; background: var(--surface); }
.plan.sel { border-color: var(--primary); background: linear-gradient(180deg, var(--mint-50) 0%, var(--surface) 60%); box-shadow: 0 4px 20px rgba(45,159,127,0.12); }
.plan .sv { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); padding: 4px 14px; border-radius: var(--r-full); color: white; font-size: 11px; font-weight: 700; white-space: nowrap;
  background: linear-gradient(135deg, var(--secondary), var(--apricot-400)); box-shadow: 0 2px 8px rgba(244,162,97,0.3);
}
.plan .pd { font-size: 13px; color: var(--on-surface-variant); margin-bottom: 6px; font-weight: 600; }
.plan .pr { font-size: 28px; font-weight: 800; color: var(--on-surface); letter-spacing: -1px; }
.plan .pr .u { font-size: 14px; font-weight: 500; color: var(--on-surface-variant); letter-spacing: 0; }
.plan .og { font-size: 12px; color: var(--on-surface-variant); text-decoration: line-through; margin-top: 4px; }
.plan .avg { font-size: 12px; color: var(--primary); font-weight: 700; margin-top: 4px; }

/* Trust signals */
.trust { display: flex; justify-content: center; gap: 20px; padding: 0 28px; margin-bottom: 16px; }
.trust-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--on-surface-variant); font-weight: 500; }
.trust-item svg { width: 14px; height: 14px; color: var(--on-surface-variant); opacity: 0.6; }

/* Bottom */
.pw-bt { padding: 0 28px 40px; margin-top: auto; }
.pw-rs { text-align: center; font-size: 14px; color: var(--on-surface-variant); margin-top: 14px; font-weight: 600; }
.pw-tm { text-align: center; font-size: 11px; color: #B0B8C1; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
<div class="phone-frame">

  <div class="top-app-bar" style="background:transparent;position:relative;z-index:10"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div><div class="title"></div></div>
  <div class="pw">
    <div class="pw-hero">
      <div class="pw-crown"><svg viewBox="0 0 42 42"><path d="M5 30l7-16 7 10 5-18 5 18 7-10 7 16z" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/><rect x="5" y="30" width="33" height="4" rx="1.5" fill="none" stroke="white" stroke-width="2"/></svg></div>
      <h1>开启你的<br>变美之旅</h1>

      <div class="trial-badge"><svg viewBox="0 0 16 16" stroke="#059669" stroke-width="2.5" fill="none"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 1.5"/></svg>新用户享 14 天免费试用</div>
      <div class="social-proof">
        <div class="avatars">
          <div class="av" style="background:linear-gradient(135deg,var(--rose-300),var(--rose-400))">L</div>

          <div class="av" style="background:linear-gradient(135deg,var(--lavender-300),var(--lavender-400))">S</div>
          <div class="av" style="background:linear-gradient(135deg,var(--apricot-300),var(--apricot-400))">J</div>
        </div>

    <div class="bens">

      <div class="ben"><div class="ck"><svg viewBox="0 0 16 16"><path d="M3.5 8l3 3L12.5 5"/></svg></div><div class="tx"><div class="main">AI 详细分析报告</div><div class="sub">痘痘、毛孔、均匀度多维度深度解读</div></div></div>

      <div class="ben"><div class="ck"><svg viewBox="0 0 16 16"><path d="M3.5 8l3 3L12.5 5"/></svg></div><div class="tx"><div class="main">分享对比卡片</div><div class="sub">记录蜕变过程，见证美丽</div></div></div>
      <div class="ben"><div class="ck"><svg viewBox="0 0 16 16"><path d="M3.5 8l3 3L12.5 5"/></svg></div><div class="tx"><div class="main">云端同步</div><div class="sub">数据安全存储，永不丢失</div></div></div>

    <div class="plans">
      <div class="plan"><div class="pd">月度会员</div><div class="pr">¥19.9<span class="u">/月</span></div></div>
      <div class="plan sel"><div class="sv">省 ¥70.8</div><div class="pd">年度会员</div><div class="pr">¥168<span class="u">/年</span></div><div class="og">¥238.8/年</div><div class="avg">约 ¥14/月</div></div>

    <div class="trust">

      <div class="trust-item"><svg viewBox="0 0 16 16"><path d="M14 4l-8 8-4-4"/></svg>随时取消</div>
      <div class="trust-item"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 1.5"/></svg>即时生效</div>

    <div class="pw-bt">
      <button class="btn btn-primary">立即订阅</button>
      <div class="pw-rs">恢复购买</div>

</div>
</body></html>
