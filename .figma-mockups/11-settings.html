<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; }

/* Section label with accent bar */
.slb {
  font-size: var(--font-c1-size); font-weight: 700; color: var(--content-tertiary);
  letter-spacing: 0.5px; padding: var(--space-4) 0 var(--space-8) var(--space-12);
  margin: var(--space-4) var(--space-16) 0; position: relative;
}
.slb::before {
  content: ''; position: absolute; left: 0; top: var(--space-4); bottom: var(--space-8);
  width: 3px; border-radius: var(--radius-full); background: var(--interactive-primary);
}

/* Settings section card */
.ssec {
  margin: 0 var(--space-16) var(--space-8); padding: var(--space-4) var(--space-16);
  background: var(--surface-primary); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm); border: var(--card-border-width) solid var(--border-subtle);
}

/* Delete dialog */
.dialog-ov {
  position: absolute; inset: 0; background: var(--overlay-dark);
  backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center;
  padding: var(--space-32); z-index: 100; border-radius: 50px;
}
.dialog-card {
  background: var(--surface-elevated); border-radius: var(--radius-xl);
  padding: var(--space-24); width: 100%; box-shadow: var(--shadow-xl);
  text-align: center; position: relative; overflow: hidden;
}
.dialog-card::before {
  content: ''; position: absolute; top: -30px; right: -20px;
  width: 80px; height: 80px; border-radius: var(--radius-full);
  background: rgba(239,68,68,0.05);
}
.warning-box {
  padding: var(--space-10) var(--space-12); border-radius: var(--radius-sm);
  background: var(--surface-error); border-left: 3px solid var(--error-400);
  font-size: var(--font-c1-size); color: var(--content-error); text-align: left;
  line-height: 1.5; margin: var(--space-12) 0;
}
.btn-danger {
  height: var(--button-height); border-radius: var(--radius-full);
  border: none; font-size: var(--font-btn-size); font-weight: var(--font-btn-weight);
  cursor: pointer; width: 100%; font-family: var(--font-family);
  background: var(--error-500); color: var(--content-inverse);
  box-shadow: 0 4px 14px rgba(239,68,68,0.3);
}
.btn-cancel {
  height: var(--button-height); border-radius: var(--radius-full);
  border: 1.5px solid var(--border-default); font-size: var(--font-btn-size);
  font-weight: var(--font-btn-weight); cursor: pointer; width: 100%;
  font-family: var(--font-family); background: transparent; color: var(--content-primary);
}
</style>
</head>
<body>

<!-- ═══════ SETTINGS ═══════ -->
<div>
<div class="phone-label">Settings</div>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="top-app-bar">
    <div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
    <span class="title">设置</span>
  </div>

  <div class="content" style="padding-top:0">
    <!-- Account -->
    <div class="slb">账户</div>
    <div class="ssec">
      <div class="menu-item">
        <div class="icon-wrap" style="background:linear-gradient(135deg,var(--primary-50),var(--primary-100))"><svg viewBox="0 0 24 24" style="color:var(--primary-400)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div class="text"><div class="primary-text">编辑资料</div><div class="secondary-text">昵称、头像、肤质</div></div>
        <div class="trailing"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="menu-item">
        <div class="icon-wrap" style="background:linear-gradient(135deg,var(--lavender-50),var(--lavender-100))"><svg viewBox="0 0 24 24" style="color:var(--lavender-400)"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <div class="text"><div class="primary-text">修改密码</div></div>
        <div class="trailing"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="menu-item">
        <div class="icon-wrap" style="background:linear-gradient(135deg,var(--secondary-50),var(--secondary-100))"><svg viewBox="0 0 24 24" fill="none" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="var(--secondary-400)"/></svg></div>
        <div class="text"><div class="primary-text">会员中心</div><div class="secondary-text">PRO 会员</div></div>
        <div class="trailing"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
    </div>

    <!-- Notifications -->
    <div class="slb">通知</div>
    <div class="ssec">
      <div class="menu-item">
        <div class="icon-wrap" style="background:linear-gradient(135deg,var(--rose-50),var(--rose-100))"><svg viewBox="0 0 24 24" style="color:var(--rose-400)"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
        <div class="text"><div class="primary-text">打卡提醒</div><div class="secondary-text">每天 08:00</div></div>
        <div class="trailing"><div class="toggle active"></div></div>
      </div>
      <div class="menu-item">
        <div class="icon-wrap" style="background:linear-gradient(135deg,var(--primary-50),var(--primary-100))"><svg viewBox="0 0 24 24" style="color:var(--primary-400)"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 4 5-8"/></svg></div>
        <div class="text"><div class="primary-text">周报推送</div></div>
        <div class="trailing"><div class="toggle active"></div></div>
      </div>
      <div class="menu-item">
        <div class="icon-wrap" style="background:linear-gradient(135deg,var(--lavender-50),var(--lavender-100))"><svg viewBox="0 0 24 24" style="color:var(--lavender-400)"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg></div>
        <div class="text"><div class="primary-text">AI 分析通知</div></div>
        <div class="trailing"><div class="toggle"></div></div>
      </div>
    </div>

    <!-- Data -->
    <div class="slb">数据与隐私</div>
    <div class="ssec">
      <div class="menu-item">
        <div class="icon-wrap" style="background:linear-gradient(135deg,var(--primary-50),var(--primary-100))"><svg viewBox="0 0 24 24" style="color:var(--primary-400)"><path d="M22 12A10 10 0 1 1 12 2"/><path d="M22 2L12 12"/></svg></div>
        <div class="text"><div class="primary-text">数据同步</div><div class="secondary-text">上次同步：2 小时前</div></div>
        <div class="trailing"><span style="font-size:var(--font-c2-size);font-weight:600;color:var(--content-brand);background:var(--surface-brand-subtle);padding:2px 8px;border-radius:var(--radius-full)">已同步</span></div>
      </div>
      <div class="menu-item">
        <div class="icon-wrap" style="background:var(--surface-tertiary)"><svg viewBox="0 0 24 24" style="color:var(--content-tertiary)"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
        <div class="text"><div class="primary-text">清除缓存</div><div class="secondary-text">23.5 MB</div></div>
        <div class="trailing"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="menu-item">
        <div class="icon-wrap" style="background:linear-gradient(135deg,var(--info-50),#D6EFF8)"><svg viewBox="0 0 24 24" style="color:var(--info-500)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
        <div class="text"><div class="primary-text">导出数据</div></div>
        <div class="trailing"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
    </div>

    <!-- About -->
    <div class="slb">关于</div>
    <div class="ssec">
      <div class="menu-item">
        <div class="icon-wrap" style="background:var(--surface-tertiary)"><svg viewBox="0 0 24 24" style="color:var(--content-tertiary)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>
        <div class="text"><div class="primary-text">版本</div></div>
        <div class="trailing"><span style="font-size:var(--font-b3-size);color:var(--content-tertiary)">1.0.0</span></div>
      </div>
      <div class="menu-item">
        <div class="icon-wrap" style="background:var(--surface-tertiary)"><svg viewBox="0 0 24 24" style="color:var(--content-tertiary)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <div class="text"><div class="primary-text">隐私政策</div></div>
        <div class="trailing"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="menu-item">
        <div class="icon-wrap" style="background:var(--surface-tertiary)"><svg viewBox="0 0 24 24" style="color:var(--content-tertiary)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="text"><div class="primary-text">服务条款</div></div>
        <div class="trailing"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
    </div>

    <!-- Bottom actions -->
    <div style="padding:var(--space-16) var(--space-16) 0">
      <button class="btn btn-outlined" style="border-color:var(--error-400);color:var(--error-500);margin-bottom:var(--space-12)">退出登录</button>
      <button class="btn btn-text" style="color:var(--content-error);font-size:var(--font-b3-size)">注销账户</button>
    </div>
  </div>
</div>
</div>

<!-- ═══════ DELETE DIALOG ═══════ -->
<div>
<div class="phone-label">Delete Account Dialog</div>
<div class="phone-frame" style="position:relative">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="top-app-bar" style="opacity:0.3"><span class="title">设置</span></div>

  <div class="dialog-ov">
    <div class="dialog-card">
      <div style="width:56px;height:56px;border-radius:var(--radius-full);background:var(--surface-error);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-16)">
        <svg viewBox="0 0 24 24" width="28" height="28" style="color:var(--error-500)"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <h3 style="font-size:var(--font-h3-size);font-weight:700;color:var(--content-primary);margin-bottom:var(--space-8)">确定注销账户？</h3>
      <div class="warning-box">注销后，所有肌肤记录、分析数据将被永久删除，且无法恢复。</div>
      <div class="text-field" style="text-align:left;margin-bottom:var(--space-16)">
        <label>请输入密码确认</label>
        <input type="password" placeholder="输入当前密码">
      </div>
      <div style="display:flex;gap:var(--space-12)">
        <button class="btn-cancel">取消</button>
        <button class="btn-danger">确认注销</button>
      </div>
    </div>
  </div>
</div>
</div>

</body>
</html>
