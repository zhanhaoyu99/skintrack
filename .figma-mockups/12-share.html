<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; }

/* Share card */
.card {
  width: 314px; margin: 0 auto var(--space-16); border-radius: var(--radius-xl);
  overflow: hidden; box-shadow: var(--shadow-lg);
  border: var(--card-border-width) solid var(--border-subtle);
}
.card-hd {
  padding: var(--space-12) var(--space-16); background: var(--grad-hero);
  display: flex; align-items: center; gap: var(--space-8);
}
.card-hd .logo {
  width: 24px; height: 24px; border-radius: var(--radius-xs);
  background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;
}
.card-hd .logo svg { width: 14px; height: 14px; color: white; stroke-width: 2.5; }
.card-hd .brand { font-size: var(--font-c1-size); font-weight: 700; color: var(--content-inverse); flex: 1; }
.card-hd .user { font-size: var(--font-c2-size); color: rgba(255,255,255,0.7); }

.card-phs { display: flex; height: 200px; position: relative; }
.card-phs .ph {
  flex: 1; position: relative; overflow: hidden;
}
.card-phs .ph .img { width: 100%; height: 100%; }
.card-phs .ph .overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: var(--space-8); background: linear-gradient(transparent, rgba(0,0,0,0.6));
}
.card-phs .ph .overlay .score { font-size: var(--font-num-md-size); font-weight: var(--font-num-md-weight); color: var(--content-inverse); }
.card-phs .ph .overlay .date { font-size: var(--font-c2-size); color: rgba(255,255,255,0.7); margin-top: 1px; }
.card-phs .vs {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 34px; height: 34px; border-radius: var(--radius-full);
  background: var(--surface-primary); box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--font-c1-size); font-weight: 800; color: var(--content-brand); z-index: 2;
}

.card-res { padding: var(--space-16); text-align: center; background: var(--surface-primary); }
.card-res .delta { font-size: 44px; font-weight: 800; color: var(--content-success); letter-spacing: -1.5px; }
.card-res .delta-label {
  display: inline-flex; padding: var(--space-4) var(--space-12); border-radius: var(--radius-full);
  background: var(--surface-success); color: var(--content-success);
  font-size: var(--font-c1-size); font-weight: 600; margin-top: var(--space-8);
}
.card-res .period { font-size: var(--font-c1-size); color: var(--content-tertiary); margin-top: var(--space-8); }

.card-footer {
  padding: var(--space-10) var(--space-16); background: var(--surface-secondary);
  display: flex; align-items: center; justify-content: space-between;
  border-top: var(--card-border-width) solid var(--border-subtle);
}
.card-footer .wm { font-size: var(--font-c2-size); color: var(--content-disabled); }
.card-footer .qr {
  width: 32px; height: 32px; border-radius: var(--radius-xs);
  background: var(--surface-tertiary); display: flex; align-items: center; justify-content: center;
}
.card-footer .qr svg { width: 18px; height: 18px; color: var(--content-tertiary); }

/* Template selector */
.tmpl { display: flex; gap: var(--space-12); justify-content: center; margin-bottom: var(--space-20); }
.tmpl-item {
  width: 56px; height: 56px; border-radius: var(--radius-md);
  border: 2px solid var(--border-default); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all var(--duration-fast);
}
.tmpl-item.active { border-color: var(--interactive-primary); background: var(--surface-brand-subtle); }
.tmpl-item svg { width: var(--icon-size-md); height: var(--icon-size-md); }

/* Share targets */
.sh-opts { display: flex; gap: var(--space-20); justify-content: center; margin-bottom: var(--space-20); }
.sh-opt {
  display: flex; flex-direction: column; align-items: center; gap: var(--space-6); cursor: pointer;
}
.sh-opt .icon {
  width: 48px; height: 48px; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
}
.sh-opt .icon svg { width: var(--icon-size-md); height: var(--icon-size-md); color: white; }
.sh-opt .name { font-size: var(--font-c2-size); color: var(--content-secondary); font-weight: 500; }
</style>
</head>
<body>

<div>
<div class="phone-label">Share Card</div>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="top-app-bar">
    <div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
    <span class="title">分享对比卡片</span>
  </div>

  <div class="content" style="display:flex;flex-direction:column;align-items:center">
    <!-- Share Card Preview -->
    <div class="card">
      <div class="card-hd">
        <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/><circle cx="12" cy="12" r="3"/></svg></div>
        <span class="brand">SkinTrack</span>
        <span class="user">Lisa 的蜕变</span>
      </div>
      <div class="card-phs">
        <div class="ph"><div class="img" style="background:linear-gradient(180deg,#D4B8A8,#B8A090)"></div><div class="overlay"><div class="score">70</div><div class="date">2月14日</div></div></div>
        <div class="ph"><div class="img" style="background:linear-gradient(180deg,#E8CFC0,#D8BCA8)"></div><div class="overlay"><div class="score">82</div><div class="date">3月14日</div></div></div>
        <div class="vs">VS</div>
      </div>
      <div class="card-res">
        <div class="delta">+10 分</div>
        <div class="delta-label">&#8593; 皮肤在变好哦</div>
        <div class="period">30 天对比</div>
      </div>
      <div class="card-footer">
        <span class="wm">SkinTrack · 记录你的美</span>
        <div class="qr"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg></div>
      </div>
    </div>

    <!-- Template selector -->
    <div class="tmpl">
      <div class="tmpl-item active"><svg viewBox="0 0 24 24" style="color:var(--primary-500)"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg></div>
      <div class="tmpl-item"><svg viewBox="0 0 24 24" style="color:var(--content-disabled)"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/></svg></div>
      <div class="tmpl-item"><svg viewBox="0 0 24 24" style="color:var(--content-disabled)"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l6-6 6 6 6-6"/></svg></div>
    </div>

    <!-- Share targets -->
    <div class="sh-opts">
      <div class="sh-opt"><div class="icon" style="background:#07C160"><svg viewBox="0 0 24 24" fill="white" stroke="none"><path d="M12 2C6.48 2 2 5.92 2 10.66c0 2.88 1.86 5.42 4.66 7l-.66 2.86L9.9 18.6c.67.14 1.37.22 2.1.22 5.52 0 10-3.92 10-8.66S17.52 2 12 2z"/></svg></div><span class="name">微信</span></div>
      <div class="sh-opt"><div class="icon" style="background:#E6162D"><svg viewBox="0 0 24 24" fill="white" stroke="none"><circle cx="12" cy="12" r="8"/><path d="M8 10h8M10 14h4" stroke="white" stroke-width="1.5" fill="none"/></svg></div><span class="name">微博</span></div>
      <div class="sh-opt"><div class="icon" style="background:#FE2C55"><svg viewBox="0 0 24 24" fill="white" stroke="none"><rect x="5" y="3" width="14" height="18" rx="3"/><circle cx="12" cy="12" r="3"/></svg></div><span class="name">小红书</span></div>
      <div class="sh-opt"><div class="icon" style="background:var(--surface-tertiary)"><svg viewBox="0 0 24 24" style="color:var(--content-secondary)"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></div><span class="name">更多</span></div>
    </div>

    <!-- Buttons -->
    <div style="display:flex;gap:var(--space-12);width:100%">
      <button class="btn btn-outlined" style="flex:1">保存图片</button>
      <button class="btn btn-primary" style="flex:1">分享</button>
    </div>
  </div>
</div>
</div>

</body>
</html>
