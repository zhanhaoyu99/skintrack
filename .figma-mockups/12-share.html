<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: 32px; padding: 32px; justify-content: center; }
.phone-frame { flex-shrink: 0; }
.sh { height: 100%; display: flex; flex-direction: column; background: var(--background); }
.sh-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
.sh-wrap::before { content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(45,159,127,0.04), transparent 70%); top: 10%; }

/* Share card */
.card { width: 314px; background: white; border-radius: var(--r-xl); overflow: hidden; position: relative; z-index: 1;
  box-shadow: 0 24px 68px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.06);
}

/* Card header */
.card-hd { padding: 14px 18px; display: flex; align-items: center; gap: 10px; color: white; position: relative; overflow: hidden;
  background: var(--grad-hero);
}
.card-hd::after { content: ''; position: absolute; top: -20px; right: -20px; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.06); }
.card-hd .logo { width: 32px; height: 32px; border-radius: 9px; background: rgba(255,255,255,0.18); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; }
.card-hd .logo svg { width: 18px; height: 18px; color: white; stroke-width: 1.5; }
.card-hd .nm { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; flex: 1; }
.card-hd .user { font-size: 12px; opacity: 0.7; font-weight: 500; }

/* Photo comparison */
.card-phs { display: flex; height: 200px; position: relative; }
.card-phs .ph { flex: 1; position: relative; overflow: hidden; }
.card-phs .ph:first-child { background: linear-gradient(145deg, #C8A898, #B8A088); }
.card-phs .ph:last-child { background: var(--skin-placeholder); }
.card-phs .ph .face-h { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-46%); opacity: 0.06; }
.card-phs .ph .face-h svg { width: 80px; height: 100px; fill: none; stroke: #000; stroke-width: 0.8; }
.card-phs .ph::after { content: ''; position: absolute; inset: 0; background: linear-gradient(transparent 40%, rgba(0,0,0,0.5)); z-index: 2; }
.card-phs .ph .lb { position: absolute; bottom: 10px; left: 12px; z-index: 3; color: white; font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
.card-phs .ph .dt { position: absolute; bottom: 10px; right: 12px; z-index: 3; color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 500; }
.card-phs .vs { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 34px; height: 34px; border-radius: 50%; background: white; box-shadow: var(--shadow-md); display: flex; align-items: center; justify-content: center; z-index: 5; }
.card-phs .vs svg { width: 16px; height: 16px; color: var(--primary); stroke-width: 2.5; }

/* Result section */
.card-res { padding: 20px 20px 16px; text-align: center; }
.card-res .delta { font-size: 44px; font-weight: 800; color: var(--success); letter-spacing: -2px; display: flex; align-items: center; justify-content: center; gap: 4px; line-height: 1; }
.card-res .delta svg { width: 24px; height: 24px; }
.card-res .desc { font-size: 15px; color: var(--on-surface-variant); margin-top: 6px; font-weight: 500; }
.card-res .period { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: var(--r-full); background: var(--surface-variant); font-size: 12px; color: var(--on-surface-variant); font-weight: 600; margin-top: 8px; }

/* Card footer */
.card-ft { padding: 12px 18px 14px; display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid var(--outline-variant); }
.card-ft .wm { font-size: 11px; color: var(--on-surface-variant); line-height: 1.4; }
.card-ft .qr { width: 40px; height: 40px; background: var(--surface-variant); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.card-ft .qr svg { width: 22px; height: 22px; color: var(--on-surface-variant); stroke-width: 0; fill: var(--on-surface-variant); }

/* Template selector */
.tmpl { display: flex; gap: 10px; justify-content: center; padding: 0 24px 14px; }
.tmpl-item { width: 48px; height: 48px; border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; background: var(--surface); }
.tmpl-item.active { border: 2px solid var(--primary); background: var(--mint-50); }
.tmpl-item:not(.active) { border: 1.5px solid var(--outline-variant); }

/* Share targets */
.sh-opts { display: flex; justify-content: center; gap: 20px; padding: 6px 32px 10px; }
.sh-opt { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.sh-opt .ic { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.sh-opt .ic svg { width: 22px; height: 22px; }
.sh-opt span { font-size: 11px; color: var(--on-surface-variant); font-weight: 500; }

.sh-acts { padding: 8px 32px 40px; display: flex; gap: 12px; }
.sh-acts .btn { flex: 1; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="#111827" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="#111827" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="#111827" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="#111827"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="#111827" opacity="0.4" stroke="none"/></svg></div></div>
  <div class="top-app-bar"><div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div><div class="title">分享对比卡片</div></div>
  <div class="sh">
    <div class="sh-wrap">
      <div class="card">
        <div class="card-hd">
          <div class="logo"><svg viewBox="0 0 18 18"><path d="M9 2C6 2 4 5 4 8c0 2.5 1.5 5 3.5 6 .5-1.2 1-2.2 1.5-2.2s1 1 1.5 2.2C12.5 13 14 10.5 14 8c0-3-2-6-5-6z"/><ellipse cx="9" cy="7.5" rx="2.5" ry="3" opacity="0.4"/></svg></div>
          <div class="nm">SkinTrack</div>
          <div class="user">Lisa 的变美日记</div>
        </div>
        <div class="card-phs">
          <div class="ph"><div class="face-h"><svg viewBox="0 0 80 100"><ellipse cx="40" cy="45" rx="30" ry="38"/><circle cx="30" cy="38" r="3"/><circle cx="50" cy="38" r="3"/></svg></div><div class="lb">72 分</div><div class="dt">3月1日</div></div>
          <div class="vs"><svg viewBox="0 0 16 16"><path d="M5 13l6-5-6-5"/></svg></div>
          <div class="ph"><div class="face-h"><svg viewBox="0 0 80 100"><ellipse cx="40" cy="45" rx="30" ry="38"/><circle cx="30" cy="38" r="3"/><circle cx="50" cy="38" r="3"/></svg></div><div class="lb">82 分</div><div class="dt">3月14日</div></div>
        </div>
        <div class="card-res">
          <div class="delta"><svg viewBox="0 0 24 24" stroke="var(--success)" stroke-width="3" fill="none"><path d="M12 19V5M6 10l6-6 6 6"/></svg>+10 分</div>
          <div class="desc">14 天变美日记~</div>
          <div class="period"><svg viewBox="0 0 12 12" width="12" height="12" stroke="var(--on-surface-variant)" stroke-width="1.5" fill="none"><circle cx="6" cy="6" r="5"/><path d="M6 3v3l2 1"/></svg>2026.3.1 - 3.14</div>
        </div>
        <div class="card-ft"><div class="wm">使用 SkinTrack<br>追踪肌肤变化</div><div class="qr"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/></svg></div></div>
      </div>
    </div>

    <!-- Template selector -->
    <div class="tmpl">
      <div class="tmpl-item active"><svg viewBox="0 0 20 20" width="18" height="18" style="color:var(--primary)"><rect x="2" y="2" width="16" height="16" rx="3"/><path d="M2 10h16"/></svg></div>
      <div class="tmpl-item"><svg viewBox="0 0 20 20" width="18" height="18" style="color:var(--on-surface-variant)"><rect x="2" y="2" width="16" height="16" rx="3"/><circle cx="10" cy="10" r="4"/></svg></div>
      <div class="tmpl-item"><svg viewBox="0 0 20 20" width="18" height="18" style="color:var(--on-surface-variant)"><rect x="2" y="2" width="16" height="16" rx="3"/><path d="M2 8h16M10 2v16"/></svg></div>
    </div>

    <!-- Share targets -->
    <div class="sh-opts">
      <div class="sh-opt"><div class="ic" style="background:#E8F5E9"><svg viewBox="0 0 24 24" style="color:#4CAF50"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div><span>微信</span></div>
      <div class="sh-opt"><div class="ic" style="background:#FFF3E0"><svg viewBox="0 0 24 24" style="color:#FF6D00"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8" stroke="white" stroke-width="2"/></svg></div><span>微博</span></div>
      <div class="sh-opt"><div class="ic" style="background:#E3F2FD"><svg viewBox="0 0 24 24" style="color:#1976D2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8" stroke="white" stroke-width="1.5"/></svg></div><span>小红书</span></div>
      <div class="sh-opt"><div class="ic" style="background:var(--surface-variant)"><svg viewBox="0 0 24 24" style="color:var(--on-surface-variant)"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div><span>更多</span></div>
    </div>
    <div class="sh-acts"><button class="btn btn-outlined">保存图片</button><button class="btn btn-primary">分享</button></div>
  </div>
</div>
</body></html>
