<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="dark.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: 32px; padding: 32px; flex-wrap: wrap; justify-content: center; background: #0A0B0C; }
.phone-frame { flex-shrink: 0; }
/* Dark Pro upgrade card */
.pro-card { background: linear-gradient(135deg, rgba(62,48,32,0.8), rgba(46,36,24,0.9)); border: 1px solid rgba(255,215,0,0.12); border-radius: var(--r-xl); padding: 24px 20px; text-align: center; position: relative; overflow: hidden; }
.pro-card::before { content: ''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,215,0,0.06); }
.pro-card .crown { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(145deg, #FFD700, #FFA500); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; box-shadow: 0 0 30px rgba(255,215,0,0.25), 0 4px 14px rgba(255,170,0,0.3); }
.pro-card .crown svg { width: 26px; height: 26px; color: white; stroke-width: 1.8; }
.pro-card h3 { font-size: 18px; font-weight: 800; color: var(--on-surface); margin-bottom: 6px; }
.pro-card p { font-size: 13px; color: var(--on-surface-variant); line-height: 1.5; margin-bottom: 16px; }
.feat-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 18px; }
.feat-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: var(--r-full); background: var(--surface-variant); font-size: 12px; font-weight: 600; color: var(--on-surface); border: 0.5px solid rgba(255,255,255,0.06); }
.feat-pill svg { width: 14px; height: 14px; }
.pro-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: var(--r-full); background: linear-gradient(135deg, #F59E0B, #D97706); color: white; font-size: 15px; font-weight: 700; border: none; box-shadow: 0 0 20px rgba(245,158,11,0.2), 0 4px 16px rgba(217,119,6,0.35); font-family: var(--font); }
.pro-btn svg { width: 18px; height: 18px; fill: white; stroke: none; }
.pro-trial { font-size: 12px; color: var(--on-surface-variant); margin-top: 10px; font-weight: 600; }
/* Dark blur */
.blur-wrap { position: relative; }
.blur-content { filter: blur(8px); opacity: 0.3; pointer-events: none; }
.blur-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--surface); padding: 10px 22px; border-radius: var(--r-full); box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--on-surface); z-index: 5; border: 0.5px solid rgba(255,255,255,0.06); }
.blur-badge svg { width: 16px; height: 16px; color: var(--warning); }
/* Detail reuse */
.dp { height: 240px; background: linear-gradient(170deg, #D4B8A8 0%, #C8A898 30%, #B8A088 60%, #A89480 100%); position: relative; overflow: hidden; }
.dp .tb { position: absolute; top: 54px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 12px; }
.dp .tb .b { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,0.25); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }
.dp .tb .b svg { width: 22px; height: 22px; color: white; }
.so { display: flex; align-items: center; gap: 18px; padding: 18px 20px; margin: -36px 16px 14px; background: var(--surface); border-radius: var(--r-xl); box-shadow: 0 4px 16px rgba(0,0,0,0.3); position: relative; z-index: 5; border: 0.5px solid rgba(255,255,255,0.04); }
.so .rg { width: 74px; height: 74px; position: relative; flex-shrink: 0; }
.so .rg svg { transform: rotate(-90deg); width: 100%; height: 100%; }
.so .rg .v { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 24px; font-weight: 800; color: var(--on-surface); }
.so .inf h3 { font-size: 19px; font-weight: 800; color: var(--on-surface); }
.so .inf p { font-size: 13px; color: var(--on-surface-variant); margin-top: 2px; }
/* Usage meter */
.meter { margin: 0 0 16px; }
.meter-bar { display: flex; align-items: center; gap: 12px; }
.meter-track { flex: 1; height: 10px; background: var(--surface-variant); border-radius: var(--r-full); overflow: hidden; }
.meter-fill { height: 100%; border-radius: var(--r-full); background: linear-gradient(90deg, var(--error), #F87171); }
.meter-label { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; }
.meter-label .used { font-weight: 700; color: var(--error); }
.meter-label .total { color: var(--on-surface-variant); }
</style>
</head>
