<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: 32px; padding: 32px; flex-wrap: wrap; justify-content: center; }
.phone-frame { flex-shrink: 0; }

/* Auth shared */
.auth { display: flex; flex-direction: column; height: 100%; background: var(--surface); position: relative; overflow: hidden; }

/* Decorative background blobs */
.auth .blob1 { position: absolute; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, rgba(45,159,127,0.07), rgba(45,159,127,0.02) 50%, transparent 70%); top: -60px; right: -80px; pointer-events: none; }
.auth .blob2 { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(244,162,97,0.05), transparent 70%); bottom: 8%; left: -50px; pointer-events: none; }
.auth .blob3 { position: absolute; width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, rgba(167,139,250,0.04), transparent 70%); top: 38%; right: -30px; pointer-events: none; }

/* Brand header */
.brand { padding: 24px 40px 12px; text-align: center; position: relative; z-index: 1; }
.brand-logo { width: 72px; height: 72px; border-radius: 22px; background: var(--grad-hero); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 8px 28px rgba(45,159,127,0.3), 0 2px 8px rgba(45,159,127,0.15); position: relative; }
.brand-logo::before { content: ''; position: absolute; inset: -6px; border-radius: 28px; background: linear-gradient(135deg, rgba(45,159,127,0.12), transparent 60%); z-index: -1; }
.brand-logo svg { width: 38px; height: 38px; color: white; stroke-width: 1.5; fill: rgba(255,255,255,0.15); }
.brand h1 { font-size: 30px; font-weight: 800; color: var(--on-surface); letter-spacing: -0.8px; }
.brand p { font-size: 14px; color: var(--on-surface-variant); margin-top: 4px; font-weight: 500; }

/* Form area */
.auth-form { padding: 0 28px; flex: 1; position: relative; z-index: 1; display: flex; flex-direction: column; }

/* Tabs */
.tabs { display: flex; margin-bottom: 22px; background: var(--surface-variant); border-radius: var(--r-full); padding: 3px; }
.tab { flex: 1; text-align: center; padding: 11px; font-size: 14px; font-weight: 600; color: var(--on-surface-variant); border-radius: var(--r-full); transition: all 0.2s; cursor: pointer; }
.tab.on { background: var(--surface); color: var(--on-surface); box-shadow: var(--shadow-sm); }

/* Input with icon */
.field { width: 100%; margin-bottom: 14px; }
.field label { font-size: 13px; font-weight: 600; color: var(--on-surface-variant); margin-bottom: 6px; display: block; letter-spacing: 0.1px; }
.field-input { position: relative; }
.field-input .prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--on-surface-variant); display: flex; align-items: center; pointer-events: none; }
.field-input .prefix svg { width: 18px; height: 18px; stroke-width: 2; }
.field-input .suffix { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--on-surface-variant); background: none; border: none; padding: 4px; cursor: pointer; display: flex; }
.field-input .suffix svg { width: 18px; height: 18px; }
.field-input input {
  width: 100%; height: 50px; border: 1.5px solid var(--outline-variant); border-radius: var(--r-md);
  padding: 0 44px 0 42px; font-size: 15px; font-family: var(--font); background: var(--surface-container);
  color: var(--on-surface); outline: none; transition: all 0.2s;
}
.field-input input.no-prefix { padding-left: var(--md); }
.field-input input:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(45,159,127,0.1); }
.field-input input::placeholder { color: #B0B8C1; font-size: 14px; }

/* Forgot password link */
.forgot-row { text-align: right; margin-top: -6px; margin-bottom: 16px; }
.forgot-row a { font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 600; }

/* Divider */
.divider { display: flex; align-items: center; gap: 16px; margin: 20px 0; color: var(--on-surface-variant); font-size: 13px; font-weight: 500; }
.divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: var(--outline-variant); }

/* Social buttons */
.social-row { display: flex; gap: 12px; }
.social-btn { flex: 1; height: 50px; border: 1.5px solid var(--outline-variant); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--surface); transition: all 0.15s; cursor: pointer; font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--on-surface); }
.social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.social-btn:hover { border-color: var(--outline); background: var(--surface-container); }

/* Terms */
.terms { text-align: center; margin-top: 14px; font-size: 12px; color: var(--on-surface-variant); line-height: 1.6; }
.terms a { color: var(--primary); text-decoration: none; font-weight: 600; }

/* Trust badges */
.trust { display: flex; justify-content: center; gap: 18px; margin-top: auto; padding-bottom: 24px; padding-top: 14px; }
.trust-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--on-surface-variant); font-weight: 500; }
.trust-item svg { width: 14px; height: 14px; color: var(--primary); stroke-width: 2; }

/* Forgot password screen */
.forgot { display: flex; flex-direction: column; height: 100%; background: var(--surface); position: relative; overflow: hidden; }
.forgot-header { padding: 0; }
.forgot-body { padding: 0 28px; flex: 1; display: flex; flex-direction: column; position: relative; z-index: 1; }
.forgot-illus { width: 88px; height: 88px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, var(--mint-100), var(--mint-50)); display: flex; align-items: center; justify-content: center; margin: 20px auto 24px; box-shadow: 0 8px 28px rgba(45,159,127,0.1); }
.forgot-illus svg { width: 40px; height: 40px; color: var(--primary); stroke-width: 1.5; }
.forgot-body h2 { font-size: 24px; font-weight: 800; color: var(--on-surface); text-align: center; letter-spacing: -0.4px; margin-bottom: 8px; }
.forgot-body .desc { font-size: 14px; color: var(--on-surface-variant); text-align: center; line-height: 1.6; margin-bottom: 28px; }
.forgot-body .info-box { background: var(--mint-50); border-radius: var(--r-md); padding: 14px 16px; display: flex; align-items: flex-start; gap: 10px; margin-bottom: 24px; }
.forgot-body .info-box svg { width: 18px; height: 18px; color: var(--primary); flex-shrink: 0; margin-top: 1px; }
.forgot-body .info-box p { font-size: 13px; color: var(--mint-600); line-height: 1.5; }
.forgot-back { text-align: center; margin-top: 16px; }
.forgot-back a { font-size: 14px; color: var(--primary); text-decoration: none; font-weight: 600; }

/* Password strength */
.pwd-str { margin: -6px 0 14px; }
.pwd-str .bars { display: flex; gap: 4px; margin-bottom: 4px; }
.pwd-str .bar-seg { flex: 1; height: 4px; border-radius: 2px; background: var(--outline-variant); }
.pwd-str .bar-seg.filled { background: var(--primary); }
.pwd-str .label { font-size: 12px; font-weight: 600; color: var(--primary); }
.pwd-reqs { margin: -6px 0 14px; display: flex; flex-direction: column; gap: 4px; }
.pwd-req { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; }
.pwd-req.met { color: #10B981; }
.pwd-req.unmet { color: var(--on-surface-variant); }
.pwd-req svg { width: 14px; height: 14px; flex-shrink: 0; }
</style>
</head>
