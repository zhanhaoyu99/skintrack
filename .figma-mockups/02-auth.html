<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; }

/* Logo */
.auth-logo {
  width: 72px; height: 72px; border-radius: 22px;
  background: var(--grad-hero); display: flex; align-items: center; justify-content: center;
  margin: 0 auto var(--space-12); box-shadow: var(--shadow-brand-md);
}
.auth-logo svg { width: 36px; height: 36px; color: white; stroke-width: 1.8; }
.auth-brand { font-size: var(--font-h1-size); font-weight: 800; color: var(--content-primary); text-align: center; letter-spacing: -0.8px; margin-bottom: var(--space-4); }
.auth-tagline { font-size: var(--font-b2-size); color: var(--content-secondary); text-align: center; margin-bottom: var(--space-24); }

/* Segmented control */
.seg {
  display: flex; padding: var(--space-4); background: var(--surface-tertiary);
  border-radius: var(--radius-md); margin-bottom: var(--space-24);
}
.seg .tab {
  flex: 1; padding: var(--space-10) 0; text-align: center;
  font-size: var(--font-b2-size); font-weight: 600; border-radius: var(--radius-sm);
  color: var(--content-secondary); border: none; background: transparent;
  font-family: var(--font-family); cursor: pointer;
  transition: all var(--duration-fast) var(--easing-standard);
}
.seg .tab.active {
  background: var(--surface-primary); color: var(--content-primary);
  box-shadow: var(--shadow-xs);
}

/* Divider with text */
.divider-text {
  display: flex; align-items: center; gap: var(--space-12); margin: var(--space-20) 0;
}
.divider-text::before, .divider-text::after {
  content: ''; flex: 1; height: var(--card-border-width); background: var(--border-subtle);
}
.divider-text span { font-size: var(--font-c1-size); color: var(--content-disabled); font-weight: 500; }

/* Social buttons */
.social-btns { display: flex; gap: var(--space-12); margin-bottom: var(--space-20); }
.social-btn {
  flex: 1; height: var(--button-height); border-radius: var(--radius-full);
  border: 1.5px solid var(--border-default); background: var(--surface-primary);
  display: flex; align-items: center; justify-content: center; gap: var(--space-8);
  font-size: var(--font-b2-size); font-weight: 600; color: var(--content-primary);
  font-family: var(--font-family); cursor: pointer;
  transition: background var(--duration-fast);
}
.social-btn:hover { background: var(--surface-secondary); }
.social-btn svg { width: var(--icon-size-sm); height: var(--icon-size-sm); }

/* Trust marks */
.trust-marks { display: flex; justify-content: center; gap: var(--space-20); }
.trust-mark {
  display: flex; flex-direction: column; align-items: center; gap: var(--space-4);
}
.trust-mark svg { width: var(--icon-size-xs); height: var(--icon-size-xs); color: var(--content-disabled); }
.trust-mark span { font-size: var(--font-c2-size); color: var(--content-disabled); font-weight: 500; }

/* Forgot password icon */
.fp-icon {
  width: 88px; height: 88px; border-radius: var(--radius-full);
  background: var(--grad-primary); display: flex; align-items: center; justify-content: center;
  margin: 0 auto var(--space-24); box-shadow: var(--shadow-brand-md);
}
.fp-icon svg { width: 40px; height: 40px; color: white; }
.info-box {
  padding: var(--space-12); border-radius: var(--radius-md);
  background: var(--surface-brand-subtle); border-left: 3px solid var(--interactive-primary);
  font-size: var(--font-b3-size); color: var(--content-brand); line-height: 1.5;
  margin-bottom: var(--space-20);
}
</style>
</head>
<body>

<!-- ═══════ LOGIN ═══════ -->
<div>
<div class="phone-label">Auth — Login</div>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="content">
    <div style="padding-top:var(--space-16)">
      <div class="auth-logo"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke-width="1.8"/><path d="M17 7l2-2 2 2" stroke-width="1.5"/></svg></div>
      <div class="auth-brand">SkinTrack</div>
      <div class="auth-tagline">记录你的美，追踪你的变</div>

      <div class="seg"><button class="tab active">登录</button><button class="tab">注册</button></div>

      <div class="text-field"><label>邮箱</label><input type="email" placeholder="你的邮箱地址"></div>
      <div class="text-field"><label>密码</label><input type="password" placeholder="输入密码"></div>

      <div style="text-align:right;margin:-8px 0 var(--space-16)"><span style="font-size:var(--font-b3-size);color:var(--content-brand);font-weight:500;cursor:pointer">忘记密码？</span></div>

      <button class="btn btn-primary" style="margin-bottom:0">登录</button>

      <div class="divider-text"><span>或</span></div>

      <div class="social-btns">
        <button class="social-btn"><svg viewBox="0 0 20 20" fill="currentColor" stroke="none"><path d="M10 0C4.477 0 0 4.477 0 10c0 4.42 2.865 8.166 6.84 9.49.5.09.68-.22.68-.485v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.07-.608.07-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 10 4.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852v2.746c0 .268.18.58.688.482C17.138 18.163 20 14.418 20 10c0-5.523-4.477-10-10-10z"/></svg>Apple</button>
        <button class="social-btn"><svg viewBox="0 0 20 20" fill="#07C160" stroke="none"><path d="M10 0C4.477 0 0 4.477 0 10s4.477 10 10 10 10-4.477 10-10S15.523 0 10 0zm3.7 14.3c-.5.3-1.1.5-1.7.5-.6 0-1.2-.2-1.7-.5L7 16l.8-2.3C6.7 12.7 6 11.4 6 10c0-2.8 2.2-5 5-5s5 2.2 5 5c0 1.4-.7 2.7-1.8 3.7l.8 2.3-1.3-1.7z"/></svg>微信</button>
      </div>

      <div class="trust-marks">
        <div class="trust-mark"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>隐私保护</span></div>
        <div class="trust-mark"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>10万+用户</span></div>
        <div class="trust-mark"><svg viewBox="0 0 24 24" fill="none" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="var(--content-disabled)"/></svg><span>4.8 评分</span></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ═══════ REGISTER ═══════ -->
<div>
<div class="phone-label">Auth — Register</div>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="content">
    <div style="padding-top:var(--space-16)">
      <div class="auth-logo"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke-width="1.8"/></svg></div>
      <div class="auth-brand">SkinTrack</div>
      <div class="auth-tagline">创建账号，开始你的护肤旅程</div>

      <div class="seg"><button class="tab">登录</button><button class="tab active">注册</button></div>

      <div class="text-field"><label>昵称</label><input type="text" placeholder="给自己取个名字吧"></div>
      <div class="text-field"><label>邮箱</label><input type="email" placeholder="你的邮箱地址"></div>
      <div class="text-field"><label>密码</label><input type="password" placeholder="至少 6 位密码"></div>
      <div class="text-field"><label>确认密码</label><input type="password" placeholder="再次输入密码"></div>

      <button class="btn btn-primary" style="margin-bottom:var(--space-16)">创建账号</button>

      <div class="trust-marks">
        <div class="trust-mark"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span>数据加密</span></div>
        <div class="trust-mark"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>随时取消</span></div>
      </div>

      <p style="font-size:var(--font-c2-size);color:var(--content-disabled);text-align:center;margin-top:var(--space-16);line-height:1.5">注册即同意《服务条款》和《隐私政策》</p>
    </div>
  </div>
</div>
</div>

<!-- ═══════ FORGOT PASSWORD ═══════ -->
<div>
<div class="phone-label">Auth — Forgot Password</div>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="top-app-bar">
    <div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
    <span class="title">找回密码</span>
  </div>

  <div class="content" style="display:flex;flex-direction:column;align-items:center;padding-top:var(--space-32)">
    <div class="fp-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg></div>

    <h2 style="font-size:var(--font-h2-size);font-weight:800;color:var(--content-primary);margin-bottom:var(--space-8);letter-spacing:var(--font-h2-ls)">重置密码</h2>
    <p style="font-size:var(--font-b2-size);color:var(--content-secondary);text-align:center;margin-bottom:var(--space-24);max-width:280px;line-height:var(--font-b2-lh)">输入你注册时使用的邮箱，我们会发送重置链接</p>

    <div style="width:100%">
      <div class="text-field"><label>邮箱</label><input type="email" placeholder="你的邮箱地址"></div>
      <div class="info-box">重置链接将在 24 小时内有效，请及时查收邮件并完成密码修改</div>
      <button class="btn btn-primary" style="margin-bottom:var(--space-12)">发送重置链接</button>
      <button class="btn btn-text" style="color:var(--content-tertiary)">返回登录</button>
    </div>
  </div>
</div>
</div>

</body>
</html>
