<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; }

/* ═══ VIEWFINDER ═══ */
.cam { background: #0A0C0B; color: var(--neutral-0); }
.cam-preview {
  flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #1A1F1C 0%, #0A0C0B 70%);
}
.cam-toolbar {
  position: absolute; top: 0; left: 0; right: 0; padding: 0 var(--space-8);
  height: var(--top-bar-height); display: flex; align-items: center; justify-content: space-between; z-index: 5;
}
.cam-toolbar .cam-btn {
  width: 44px; height: 44px; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
}
.cam-toolbar .cam-btn svg { width: var(--icon-size-md); height: var(--icon-size-md); color: rgba(255,255,255,0.8); }
.cam-toolbar .cam-actions { display: flex; gap: var(--space-4); }

/* Face guide */
.face-guide { position: relative; width: 240px; height: 320px; }
.face-guide .oval {
  width: 100%; height: 100%; border-radius: 50%; border: 1.5px dashed rgba(255,255,255,0.2);
  position: absolute; inset: 0;
}
.face-guide .corner {
  position: absolute; width: 24px; height: 24px;
}
.face-guide .corner svg { width: 24px; height: 24px; color: rgba(255,255,255,0.5); stroke-width: 2.5; }
.face-guide .c-tl { top: 20px; left: 20px; }
.face-guide .c-tr { top: 20px; right: 20px; transform: scaleX(-1); }
.face-guide .c-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
.face-guide .c-br { bottom: 20px; right: 20px; transform: scale(-1); }
.face-guide .hint {
  position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%);
  font-size: var(--font-b3-size); color: rgba(255,255,255,0.5); font-weight: 500; white-space: nowrap;
}
/* Face silhouette */
.face-sil {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 140px; height: 180px; opacity: 0.06;
}

/* Light badge */
.light-badge {
  position: absolute; top: var(--space-8); left: 50%; transform: translateX(-50%);
  padding: var(--space-4) var(--space-12); border-radius: var(--radius-full);
  background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
  font-size: var(--font-c2-size); font-weight: 600; color: rgba(255,255,255,0.6);
  display: flex; align-items: center; gap: var(--space-4);
}

/* Bottom controls */
.cam-controls {
  padding: var(--space-24) 0 var(--space-48); display: flex; align-items: center; justify-content: center;
  gap: var(--space-40); flex-shrink: 0;
}
.shutter {
  width: 76px; height: 76px; border-radius: var(--radius-full);
  border: 3.5px solid rgba(255,255,255,0.9); background: transparent;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  position: relative;
}
.shutter-inner {
  width: 62px; height: 62px; border-radius: var(--radius-full);
  background: rgba(255,255,255,0.95);
}
.cam-side {
  width: 44px; height: 44px; border-radius: var(--radius-full);
  background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center;
}
.cam-side svg { width: var(--icon-size-md); height: var(--icon-size-md); color: rgba(255,255,255,0.7); }

/* ═══ RESULT ═══ */
.result-photo {
  height: 340px; position: relative; overflow: hidden;
  background: var(--grad-skin);
}
.result-photo .face-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
}
.result-photo .face-overlay svg { width: 160px; height: 200px; opacity: 0.08; }
.result-photo .toolbar {
  position: absolute; top: 0; left: 0; right: 0; padding: 0 var(--space-8);
  height: var(--top-bar-height); display: flex; align-items: center;
}
.result-photo .toolbar svg { width: var(--icon-size-md); height: var(--icon-size-md); color: var(--content-inverse); }
.result-body { padding: var(--space-16); position: relative; }

/* Score ring floating */
.result-ring {
  width: 80px; height: 80px; border-radius: var(--radius-full);
  background: var(--surface-primary); box-shadow: var(--shadow-lg);
  display: flex; align-items: center; justify-content: center;
  position: absolute; top: -40px; left: 50%; transform: translateX(-50%); z-index: 5;
}
.result-ring .ring-val {
  font-size: var(--font-num-lg-size); font-weight: var(--font-num-lg-weight);
  color: var(--content-brand);
}

.result-title { text-align: center; margin-top: var(--space-48); }
.result-title h2 { font-size: var(--font-h3-size); font-weight: 700; color: var(--content-primary); }
.result-title p { font-size: var(--font-b3-size); color: var(--content-secondary); margin-top: var(--space-4); line-height: var(--font-b3-lh); }

/* Mini metrics in result */
.result-metrics {
  display: flex; gap: var(--space-8); justify-content: center; margin: var(--space-16) 0;
}
.rm-item {
  width: 56px; text-align: center; padding: var(--space-8) var(--space-4);
  background: var(--surface-secondary); border-radius: var(--radius-sm);
}
.rm-item .rm-val { font-size: var(--font-num-sm-size); font-weight: var(--font-num-sm-weight); }
.rm-item .rm-lbl { font-size: 9px; font-weight: 600; color: var(--content-tertiary); margin-top: var(--space-2); }

/* Streak badge */
.streak {
  display: flex; align-items: center; justify-content: center; gap: var(--space-6);
  padding: var(--space-8) var(--space-16); border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--secondary-50), #FFF8F0);
  border: var(--card-border-width) solid rgba(244,162,97,0.1);
  margin: 0 auto var(--space-16); width: fit-content;
  font-size: var(--font-b3-size); font-weight: 700; color: var(--secondary-600);
}

.result-actions { display: flex; gap: var(--space-12); padding: 0 var(--space-8); }
.result-actions .btn { flex: 1; }

/* ═══ PERMISSION ═══ */
.perm-icon {
  width: 80px; height: 80px; border-radius: var(--radius-full);
  background: var(--rose-50); display: flex; align-items: center; justify-content: center;
  margin: 0 auto var(--space-24);
}
.perm-icon svg { width: var(--icon-size-xl); height: var(--icon-size-xl); color: var(--rose-400); }
.feature-item {
  display: flex; align-items: flex-start; gap: var(--space-12); margin-bottom: var(--space-16);
}
.feature-item .check {
  width: 22px; height: 22px; border-radius: var(--radius-full);
  background: var(--surface-brand-subtle); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  margin-top: var(--space-2);
}
.feature-item .check svg { width: 14px; height: 14px; color: var(--content-brand); stroke-width: 3; }
.feature-item .text { font-size: var(--font-b2-size); color: var(--content-secondary); line-height: var(--font-b2-lh); }
</style>
</head>
<body>

<!-- ═══════ CAMERA: VIEWFINDER ═══════ -->
<div>
<div class="phone-label">Camera — Viewfinder</div>
<div class="phone-frame cam">
  <div class="status-bar light"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="white" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="white" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="white"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="white" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="cam-preview">
    <div class="cam-toolbar">
      <div class="cam-btn"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div>
      <div class="cam-actions">
        <div class="cam-btn"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
        <div class="cam-btn"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      </div>
    </div>
    <div class="light-badge">
      <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="3"/><path d="M6 1v1M6 10v1M1 6h1M10 6h1M2.8 2.8l.7.7M8.5 8.5l.7.7M2.8 9.2l.7-.7M8.5 3.5l.7-.7"/></svg>
      光线良好
    </div>
    <div class="face-guide">
      <div class="oval"></div>
      <div class="corner c-tl"><svg viewBox="0 0 24 24"><path d="M4 16V8a4 4 0 0 1 4-4h8"/></svg></div>
      <div class="corner c-tr"><svg viewBox="0 0 24 24"><path d="M4 16V8a4 4 0 0 1 4-4h8"/></svg></div>
      <div class="corner c-bl"><svg viewBox="0 0 24 24"><path d="M4 16V8a4 4 0 0 1 4-4h8"/></svg></div>
      <div class="corner c-br"><svg viewBox="0 0 24 24"><path d="M4 16V8a4 4 0 0 1 4-4h8"/></svg></div>
      <div class="face-sil">
        <svg viewBox="0 0 100 130" fill="none" stroke="white" stroke-width="1">
          <ellipse cx="50" cy="60" rx="35" ry="45"/>
          <circle cx="35" cy="52" r="3"/><circle cx="65" cy="52" r="3"/>
          <path d="M42 75c4 5 12 5 16 0"/>
        </svg>
      </div>
      <div class="hint">将面部置于框内</div>
    </div>
  </div>

  <div class="cam-controls">
    <div class="cam-side"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
    <div class="shutter"><div class="shutter-inner"></div></div>
    <div class="cam-side"><svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></div>
  </div>
</div>
</div>

<!-- ═══════ CAMERA: RESULT ═══════ -->
<div>
<div class="phone-label">Camera — Result</div>
<div class="phone-frame">
  <div class="result-photo">
    <div class="status-bar light"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="white" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="white" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="white"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="white" opacity="0.4" stroke="none"/></svg></div></div>
    <div class="toolbar"><div class="cam-btn" style="width:44px;height:44px;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" style="color:white;width:24px;height:24px"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div></div>
    <div class="face-overlay"><svg viewBox="0 0 100 130" fill="none" stroke="white" stroke-width="0.8"><ellipse cx="50" cy="60" rx="35" ry="45"/><circle cx="35" cy="52" r="3"/><circle cx="65" cy="52" r="3"/><path d="M42 75c4 5 12 5 16 0"/></svg></div>
  </div>

  <div class="result-body">
    <div class="result-ring">
      <svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="34" fill="none" stroke="var(--surface-tertiary)" stroke-width="5"/><circle cx="40" cy="40" r="34" fill="none" stroke="var(--primary-400)" stroke-width="5" stroke-linecap="round" stroke-dasharray="214" stroke-dashoffset="38" transform="rotate(-90 40 40)"/></svg>
      <span class="ring-val" style="position:absolute">82</span>
    </div>

    <div class="result-title">
      <h2>皮肤状态不错哦</h2>
      <p>各项指标都在稳步改善中，继续保持~</p>
    </div>

    <div class="result-metrics">
      <div class="rm-item"><div class="rm-val" style="color:var(--metric-acne)">85</div><div class="rm-lbl">痘痘</div></div>
      <div class="rm-item"><div class="rm-val" style="color:var(--metric-pore)">78</div><div class="rm-lbl">毛孔</div></div>
      <div class="rm-item"><div class="rm-val" style="color:var(--metric-evenness)">82</div><div class="rm-lbl">均匀</div></div>
      <div class="rm-item"><div class="rm-val" style="color:var(--metric-redness)">75</div><div class="rm-lbl">泛红</div></div>
      <div class="rm-item"><div class="rm-val" style="color:var(--metric-hydration)">80</div><div class="rm-lbl">水润</div></div>
    </div>

    <div class="streak">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="var(--secondary-500)" stroke="none"><path d="M8 2C6.5 4 5 6.5 5 8.5 5 11 6.3 12 8 12s3-1 3-3.5C11 6.5 9.5 4 8 2z"/></svg>
      连续打卡 7 天
    </div>

    <div class="result-actions">
      <button class="btn btn-outlined">继续拍照</button>
      <button class="btn btn-primary">查看详情</button>
    </div>
  </div>
</div>
</div>

<!-- ═══════ CAMERA: PERMISSION ═══════ -->
<div>
<div class="phone-label">Camera — Permission</div>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>

  <div class="content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:var(--space-32)">
    <div class="perm-icon">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </div>

    <h2 style="font-size:var(--font-h2-size);font-weight:800;color:var(--content-primary);margin-bottom:var(--space-8);letter-spacing:var(--font-h2-ls)">来拍张自拍吧</h2>
    <p style="font-size:var(--font-b2-size);color:var(--content-secondary);line-height:var(--font-b2-lh);margin-bottom:var(--space-32);max-width:280px">我们需要使用相机来拍摄你的皮肤照片，AI 会帮你分析肌肤状况</p>

    <div style="width:100%;text-align:left;margin-bottom:var(--space-32)">
      <div class="feature-item">
        <div class="check"><svg viewBox="0 0 14 14"><polyline points="3 7 5.5 9.5 11 4"/></svg></div>
        <div class="text">AI 智能分析五大肌肤维度</div>
      </div>
      <div class="feature-item">
        <div class="check"><svg viewBox="0 0 14 14"><polyline points="3 7 5.5 9.5 11 4"/></svg></div>
        <div class="text">追踪肌肤变化趋势</div>
      </div>
      <div class="feature-item">
        <div class="check"><svg viewBox="0 0 14 14"><polyline points="3 7 5.5 9.5 11 4"/></svg></div>
        <div class="text">照片仅保存在本地，隐私安全</div>
      </div>
    </div>

    <button class="btn btn-primary" style="margin-bottom:var(--space-12)">允许使用相机</button>
    <button class="btn btn-text">下次再说</button>
  </div>
</div>
</div>

</body>
</html>
