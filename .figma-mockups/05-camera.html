<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: 32px; padding: 32px; flex-wrap: wrap; justify-content: center; }
.phone-frame { flex-shrink: 0; }

/* ===== Camera Viewfinder ===== */
.cam { height: 100%; background: #000; display: flex; flex-direction: column; }
.cam .status-bar .time { color: #fff; }
.cam .status-bar svg { fill: #fff !important; }

/* Preview area */
.cam-preview { flex: 1; background: linear-gradient(170deg, #2E3D35 0%, #1E2D25 40%, #141E18 100%); position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }

/* Top toolbar */
.cam-toolbar { position: absolute; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; z-index: 10; }
.cam-btn { width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,0.35); backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: center; border: 0.5px solid rgba(255,255,255,0.1); cursor: pointer; }
.cam-btn svg { width: 22px; height: 22px; color: white; }

/* Face guide with corner brackets */
.face-guide { width: 240px; height: 310px; position: relative; display: flex; align-items: center; justify-content: center; }

/* Subtle dashed oval */
.face-guide .oval { width: 100%; height: 100%; border: 1.5px dashed rgba(255,255,255,0.2); border-radius: 120px; position: absolute; }

/* Corner bracket markers */
.corner { position: absolute; width: 36px; height: 36px; }
.corner::before, .corner::after { content: ''; position: absolute; background: rgba(255,255,255,0.85); border-radius: 2px; }
.c-tl { top: 16px; left: 16px; }
.c-tl::before { top: 0; left: 0; width: 3px; height: 24px; }
.c-tl::after { top: 0; left: 0; width: 24px; height: 3px; }
.c-tr { top: 16px; right: 16px; }
.c-tr::before { top: 0; right: 0; width: 3px; height: 24px; }
.c-tr::after { top: 0; right: 0; width: 24px; height: 3px; }
.c-bl { bottom: 16px; left: 16px; }
.c-bl::before { bottom: 0; left: 0; width: 3px; height: 24px; }
.c-bl::after { bottom: 0; left: 0; width: 24px; height: 3px; }
.c-br { bottom: 16px; right: 16px; }
.c-br::before { bottom: 0; right: 0; width: 3px; height: 24px; }
.c-br::after { bottom: 0; right: 0; width: 24px; height: 3px; }

/* Face silhouette */
.face-sil { opacity: 0.06; pointer-events: none; }
.face-sil svg { width: 140px; height: 180px; color: white; stroke-width: 1; fill: none; }

/* Tip text */
.guide-tip { position: absolute; bottom: -48px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 600; white-space: nowrap; letter-spacing: 1px; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: var(--r-full); backdrop-filter: blur(8px); border: 0.5px solid rgba(255,255,255,0.08); }

/* Lighting indicator */
.light-badge { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.3); color: #6EE7B7; font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: var(--r-full); display: flex; align-items: center; gap: 5px; backdrop-filter: blur(8px); }
.light-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #6EE7B7; }

/* Bottom controls */
.cam-controls { height: 150px; background: #000; display: flex; align-items: center; justify-content: center; gap: 48px; padding-bottom: 36px; }
.shutter { width: 76px; height: 76px; border-radius: 50%; border: 3.5px solid white; background: transparent; padding: 5px; box-shadow: 0 0 28px rgba(255,255,255,0.08); cursor: pointer; }
.shutter-inner { width: 100%; height: 100%; border-radius: 50%; background: white; }
.ctrl-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; border: 0.5px solid rgba(255,255,255,0.12); cursor: pointer; }
.ctrl-btn svg { width: 20px; height: 20px; color: white; }

/* ===== Result Screen ===== */
.result { height: 100%; display: flex; flex-direction: column; background: var(--surface); }
.result-photo { height: 340px; position: relative; overflow: hidden; flex-shrink: 0; }
.result-photo .photo-bg { position: absolute; inset: 0; background: var(--skin-placeholder); }
/* Face silhouette on photo */
.result-photo .face-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -48%); opacity: 0.1; pointer-events: none; }
.result-photo .face-overlay svg { width: 200px; height: 260px; color: #000; fill: none; stroke-width: 0.8; }
.result-photo .photo-gradient { position: absolute; inset: 0; background: linear-gradient(transparent 40%, rgba(0,0,0,0.2)); }
.result-photo .back-btn { position: absolute; top: 54px; left: 16px; z-index: 2; }

/* Score ring floating over photo */
.result-body { flex: 1; padding: 0 24px 24px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.score-ring { width: 120px; height: 120px; position: relative; margin-top: -60px; background: var(--surface); border-radius: 50%; padding: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06); }
.score-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
.score-ring .score-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
.score-ring .score-num { font-size: 32px; font-weight: 800; color: var(--on-surface); display: block; letter-spacing: -1px; }
.score-ring .score-label { font-size: 10px; color: var(--on-surface-variant); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

.result-title { font-size: 22px; font-weight: 800; color: var(--on-surface); margin-top: 14px; letter-spacing: -0.4px; }
.result-desc { font-size: 14px; color: var(--on-surface-variant); margin-top: 6px; line-height: 1.5; }

/* Mini metrics */
.metrics-row { display: flex; gap: 14px; margin-top: 16px; }
.metric { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.metric .dot { width: 8px; height: 8px; border-radius: 50%; }
.metric .val { font-size: 14px; font-weight: 700; color: var(--on-surface); }
.metric .lbl { font-size: 10px; color: var(--on-surface-variant); font-weight: 500; }

/* Streak badge */
.streak-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; background: linear-gradient(135deg, var(--apricot-50), #FFF8F0); border: 1px solid var(--apricot-100); border-radius: var(--r-full); color: var(--apricot-500); font-size: 14px; font-weight: 700; margin-top: 14px; }
.streak-badge svg { width: 16px; height: 16px; fill: var(--apricot-400); stroke: none; }

/* Action buttons */
.result-actions { display: flex; gap: 12px; width: 100%; margin-top: auto; }
.result-actions .btn { flex: 1; }

/* ===== Permission Screen ===== */
.permission { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 36px; background: var(--surface); position: relative; overflow: hidden; }
.permission::before { content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, var(--mint-50), transparent 70%); top: 12%; opacity: 0.5; pointer-events: none; }
.permission::after { content: ''; position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, var(--rose-50), transparent 70%); bottom: 18%; right: -40px; opacity: 0.4; pointer-events: none; }

.perm-icon { width: 130px; height: 130px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, var(--rose-100), var(--rose-50)); display: flex; align-items: center; justify-content: center; margin-bottom: 28px; position: relative; z-index: 1; box-shadow: 0 12px 40px rgba(251,113,133,0.15); }
.perm-icon::before { content: ''; position: absolute; inset: -8px; border-radius: 50%; background: radial-gradient(circle, rgba(251,113,133,0.08), transparent 70%); }
.perm-icon svg { width: 52px; height: 52px; color: var(--rose-400); stroke-width: 1.4; }

.permission h2 { font-size: 26px; font-weight: 800; color: var(--on-surface); margin-bottom: 8px; letter-spacing: -0.5px; position: relative; z-index: 1; }
.permission .perm-desc { font-size: 15px; color: var(--on-surface-variant); line-height: 1.65; margin-bottom: 28px; position: relative; z-index: 1; }

/* Feature list */
.feature-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; position: relative; z-index: 1; width: 100%; }
.feature-item { display: flex; align-items: center; gap: 12px; text-align: left; }
.feature-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.feature-dot svg { width: 15px; height: 15px; stroke-width: 2.5; }
.feature-item span { font-size: 15px; color: var(--on-surface); font-weight: 500; }

.permission .btn { position: relative; z-index: 1; }
.permission .btn-text { margin-top: 10px; }
</style>
</head>
