<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=390">
<link rel="stylesheet" href="base.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
body { display: flex; gap: var(--space-32); padding: var(--space-32); flex-wrap: wrap; justify-content: center; background: #1A1F1C; }
.ob-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 var(--space-32); text-align: center; }
.ob-illus { width: 240px; height: 240px; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; margin-bottom: var(--space-32); position: relative; }
.dots { display: flex; gap: var(--space-8); margin-bottom: var(--space-24); }
.dot { width: 8px; height: 8px; border-radius: var(--radius-full); background: var(--border-default); }
.dot.active { width: 28px; background: var(--interactive-primary); border-radius: var(--radius-full); }
.ob-bottom { padding: 0 var(--space-32) var(--space-48); flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }

.slb { font-size: var(--font-c1-size); font-weight: 700; color: var(--content-tertiary); letter-spacing: 0.5px; padding: var(--space-4) 0 var(--space-8) var(--space-12); margin: var(--space-4) var(--space-16) 0; position: relative; }
.slb::before { content:''; position:absolute; left:0; top:var(--space-4); bottom:var(--space-8); width:3px; border-radius:var(--radius-full); background:var(--interactive-primary); }
.ssec { margin: 0 var(--space-16) var(--space-8); padding: var(--space-4) var(--space-16); background: var(--surface-secondary); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: var(--card-border-width) solid var(--border-subtle); }
</style>
</head>
<body>

<!-- ═══════ DARK: ONBOARDING ═══════ -->
<div>
<div class="phone-label" style="color:var(--neutral-400)">Dark — Onboarding</div>
<div class="phone-frame" data-theme="dark">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>
  <div class="ob-content">
    <div class="ob-illus" style="background:radial-gradient(circle at 40% 40%,rgba(42,157,124,0.15),rgba(42,157,124,0.05) 70%,transparent)">
      <svg viewBox="0 0 80 80" width="100" height="100" fill="none" style="color:var(--primary-300);stroke-width:1.2">
        <ellipse cx="40" cy="38" rx="18" ry="22"/><circle cx="33" cy="34" r="2" fill="var(--primary-300)" stroke="none"/><circle cx="47" cy="34" r="2" fill="var(--primary-300)" stroke="none"/>
        <path d="M35 46c3 3 7 3 10 0"/><rect x="54" y="14" width="16" height="13" rx="4"/><circle cx="62" cy="20.5" r="4"/>
      </svg>
    </div>
    <div style="font-size:28px;font-weight:800;color:var(--content-primary);letter-spacing:-0.5px;line-height:1.25;margin-bottom:var(--space-10)">记录你的<br>皮肤变化</div>
    <div style="font-size:var(--font-b2-size);color:var(--content-secondary);line-height:var(--font-b2-lh);max-width:280px;margin-bottom:var(--space-32)">每天拍一张自拍，AI 帮你追踪皮肤状态</div>
    <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
  <div class="ob-bottom"><button class="btn btn-primary">下一步</button><span style="font-size:var(--font-b3-size);color:var(--content-tertiary);margin-top:var(--space-12)">跳过</span></div>
</div>
</div>

<!-- ═══════ DARK: PAYWALL ═══════ -->
<div>
<div class="phone-label" style="color:var(--neutral-400)">Dark — Paywall</div>
<div class="phone-frame" data-theme="dark">
  <div style="padding:var(--space-32) var(--space-16) var(--space-24);text-align:center;background:var(--grad-paywall);position:relative;overflow:hidden">
    <div class="status-bar light"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="white" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="white" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="white" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="white"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="white" opacity="0.4" stroke="none"/></svg></div></div>
    <div style="width:80px;height:80px;border-radius:var(--radius-full);background:var(--gold-gradient);display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-16);box-shadow:0 8px 32px rgba(255,215,0,0.25)"><svg viewBox="0 0 24 24" width="32" height="32" fill="white" stroke="none"><path d="M2 6l4 8 6-6 6 6 4-8v12H2V6z"/></svg></div>
    <div style="font-size:var(--font-h2-size);font-weight:800;color:white;margin-bottom:var(--space-8);position:relative;z-index:1">解锁全部功能</div>
    <div style="font-size:var(--font-b2-size);color:rgba(255,255,255,0.7);position:relative;z-index:1">AI 深度分析 · 无限记录 · 归因报告</div>
    <div style="display:inline-flex;align-items:center;gap:var(--space-4);padding:var(--space-4) var(--space-16);border-radius:var(--radius-full);background:var(--surface-success);color:var(--content-success);font-size:var(--font-c1-size);font-weight:600;margin-top:var(--space-16);position:relative;z-index:1">14 天免费试用</div>
  </div>
  <div class="content" style="padding-top:var(--space-12)">
    <div style="display:flex;gap:var(--space-10);margin-bottom:var(--space-16)">
      <div style="flex:1;padding:var(--space-16);border-radius:var(--radius-lg);border:1.5px solid var(--border-default)"><div style="font-size:var(--font-num-lg-size);font-weight:700;color:var(--content-primary)">¥19.9<span style="font-size:var(--font-c1-size);color:var(--content-tertiary)">/月</span></div><div style="font-size:var(--font-b3-size);color:var(--content-secondary);margin-top:var(--space-4)">月度</div></div>
      <div style="flex:1;padding:var(--space-16);border-radius:var(--radius-lg);border:1.5px solid var(--interactive-primary);background:var(--surface-brand-subtle);box-shadow:var(--shadow-brand-sm);position:relative"><div style="position:absolute;top:-8px;right:var(--space-8);padding:var(--space-2) var(--space-8);border-radius:var(--radius-full);background:var(--rose-400);color:white;font-size:9px;font-weight:700">省 ¥70.8</div><div style="font-size:var(--font-num-lg-size);font-weight:700;color:var(--content-primary)">¥168<span style="font-size:var(--font-c1-size);color:var(--content-tertiary)">/年</span></div><div style="font-size:var(--font-b3-size);color:var(--content-secondary);margin-top:var(--space-4)">年度 · 推荐</div></div>
    </div>
    <button class="btn btn-primary">立即订阅</button>
  </div>
</div>
</div>

<!-- ═══════ DARK: SETTINGS ═══════ -->
<div>
<div class="phone-label" style="color:var(--neutral-400)">Dark — Settings</div>
<div class="phone-frame" data-theme="dark">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>
  <div class="top-app-bar"><div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div><span class="title">设置</span></div>
  <div class="content" style="padding-top:0">
    <div class="slb">账户</div>
    <div class="ssec">
      <div class="menu-item">
        <div class="icon-wrap" style="background:rgba(42,157,124,0.12)"><svg viewBox="0 0 24 24" style="color:var(--primary-400)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div class="text"><div class="primary-text">编辑资料</div></div>
        <div class="trailing"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
      <div class="menu-item">
        <div class="icon-wrap" style="background:rgba(155,138,219,0.12)"><svg viewBox="0 0 24 24" style="color:var(--lavender-400)"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <div class="text"><div class="primary-text">修改密码</div></div>
        <div class="trailing"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </div>
    </div>
    <div class="slb">通知</div>
    <div class="ssec">
      <div class="menu-item">
        <div class="icon-wrap" style="background:rgba(242,122,142,0.12)"><svg viewBox="0 0 24 24" style="color:var(--rose-400)"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
        <div class="text"><div class="primary-text">打卡提醒</div><div class="secondary-text">每天 08:00</div></div>
        <div class="trailing"><div class="toggle active"></div></div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- ═══════ DARK: SHARE ═══════ -->
<div>
<div class="phone-label" style="color:var(--neutral-400)">Dark — Share</div>
<div class="phone-frame" data-theme="dark">
  <div class="status-bar"><span class="time">9:41</span><div class="icons"><svg viewBox="0 0 18 12" width="18"><path d="M1 8.5h2v3H1zM5 6h2v5.5H5zM9 3.5h2v8H9zM13 1h2v10.5h-2z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 16 12" width="16"><path d="M8 2.4A8.5 8.5 0 0 0 1.3 5.3l1.1 1.1A6.8 6.8 0 0 1 8 4.1c2.2 0 4.2.8 5.6 2.3l1.1-1.1A8.5 8.5 0 0 0 8 2.4zM8 6.1a5 5 0 0 0-3.5 1.4l1.1 1.1c.6-.5 1.5-.8 2.4-.8s1.8.3 2.4.8l1.1-1.1A5 5 0 0 0 8 6.1zM9.2 10a1.2 1.2 0 1 1-2.4 0 1.2 1.2 0 0 1 2.4 0z" fill="currentColor" stroke="none"/></svg><svg viewBox="0 0 28 13" width="28"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.35"/><rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/><path d="M25 4.5v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.4" stroke="none"/></svg></div></div>
  <div class="top-app-bar"><div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></div><span class="title">分享对比卡片</span></div>
  <div class="content" style="display:flex;flex-direction:column;align-items:center">
    <!-- Dark share card still uses light surfaces for the card itself -->
    <div style="width:280px;border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-xl);margin-bottom:var(--space-20)">
      <div style="padding:var(--space-10) var(--space-12);background:var(--grad-hero);display:flex;align-items:center;gap:var(--space-6)"><div style="width:20px;height:20px;border-radius:var(--radius-xs);background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" width="12" height="12" style="color:white;stroke-width:2.5"><path d="M12 2a10 10 0 1 0 10 10"/><circle cx="12" cy="12" r="3"/></svg></div><span style="font-size:var(--font-c1-size);font-weight:700;color:white;flex:1">SkinTrack</span><span style="font-size:var(--font-c2-size);color:rgba(255,255,255,0.6)">Lisa</span></div>
      <div style="display:flex;height:160px"><div style="flex:1;background:var(--grad-skin);position:relative"><div style="position:absolute;bottom:0;left:0;right:0;padding:var(--space-6);background:linear-gradient(transparent,rgba(0,0,0,0.5))"><div style="font-size:var(--font-num-sm-size);font-weight:700;color:white">70</div><div style="font-size:9px;color:rgba(255,255,255,0.6)">2/14</div></div></div><div style="flex:1;background:linear-gradient(135deg,#E0C8B8,#D0B0A0);position:relative"><div style="position:absolute;bottom:0;left:0;right:0;padding:var(--space-6);background:linear-gradient(transparent,rgba(0,0,0,0.5))"><div style="font-size:var(--font-num-sm-size);font-weight:700;color:white">82</div><div style="font-size:9px;color:rgba(255,255,255,0.6)">3/14</div></div></div></div>
      <div style="padding:var(--space-12);text-align:center;background:white"><div style="font-size:36px;font-weight:800;color:#059669">+10 分</div><div style="font-size:var(--font-c1-size);color:#6B756F;margin-top:var(--space-4)">30 天对比</div></div>
      <div style="padding:var(--space-8) var(--space-12);background:#F8FAF9;display:flex;justify-content:space-between;align-items:center"><span style="font-size:9px;color:#ABB3AE">SkinTrack · 记录你的美</span><div style="width:24px;height:24px;border-radius:var(--radius-xs);background:#E4E8E6"></div></div>
    </div>
    <div style="display:flex;gap:var(--space-12);width:100%"><button class="btn btn-outlined" style="flex:1">保存图片</button><button class="btn btn-primary" style="flex:1">分享</button></div>
  </div>
</div>
</div>

</body>
</html>
